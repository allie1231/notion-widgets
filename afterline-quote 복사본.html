<!DOCTYPE html><html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Afterline</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:transparent;display:flex;justify-content:center;align-items:flex-start;padding:16px;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif}
.win{border-radius:12px;border:.5px solid rgba(0,0,0,.12);background:#fff;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.05)}
.tb{background:#EBEBEB;padding:8px 12px 7px;display:flex;align-items:center;border-bottom:.5px solid rgba(0,0,0,.1)}
.tls{display:flex;gap:5px}.tl{width:11px;height:11px;border-radius:50%}
.wt{flex:1;font-size:12px;font-weight:500;color:#3C3C3C;text-align:center}.sp{width:42px}
.row{border-bottom:.5px solid rgba(0,0,0,.06)}.row:last-child{border-bottom:none}
.win{width:272px}
.qbody{padding:20px 18px 14px;min-height:120px;position:relative}
.qdeco{font-size:64px;line-height:1;color:rgba(0,0,0,.06);position:absolute;top:6px;left:12px;font-family:Georgia,serif}
.qtxt{font-size:14px;color:#1C1C1E;line-height:1.8;padding-top:24px;word-break:keep-all;min-height:72px;transition:opacity .3s}
.qtxt.fade{opacity:0}
.qsrc{margin-top:10px;padding-top:9px;border-top:.5px solid rgba(0,0,0,.07);font-size:11px;color:#8E8E93;transition:opacity .3s}
.qsrc.fade{opacity:0}
.qfoot{padding:8px 14px 10px;border-top:.5px solid rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center}
.qnav{background:none;border:none;font-size:12px;color:#007AFF;cursor:pointer;font-family:inherit;padding:3px 6px}
.qnav:disabled{color:#C7C7CC;cursor:default}
.qctr{font-size:11px;color:#8E8E93}
.qshuf{background:none;border:none;font-size:11px;color:#8E8E93;cursor:pointer;font-family:inherit}
.qshuf:hover{color:#007AFF}
.badge{font-size:9px;background:#FFEEF4;color:#FF6B8A;padding:2px 7px;border-radius:4px;font-weight:500;margin-right:4px}
.badge.live{background:#E8F8E8;color:#28C840}
</style></head><body>
<div class="win">
  <div class="tb"><div class="tls"><div class="tl" style="background:#FF5F57"></div><div class="tl" style="background:#FFBD2E"></div><div class="tl" style="background:#28C840"></div></div><div class="wt">Afterline</div><div class="sp" style="display:flex;align-items:center;justify-content:flex-end"><span class="badge" id="badge">sample</span></div></div>
  <div class="qbody">
    <div class="qdeco">&#8220;</div>
    <p class="qtxt" id="qt">문장은 기억이 선택한 형태다.</p>
    <div class="qsrc" id="qs"><span id="qn"></span><span id="qsrc">&#8212; 잇재 아카이브</span></div>
  </div>
  <div class="qfoot">
    <div style="display:flex;gap:4px"><button class="qnav" id="bp" onclick="go(-1)">&#8592; Prev</button><button class="qnav" id="bn" onclick="go(+1)">Next &#8594;</button></div>
    <span class="qctr" id="ctr">&#8212; / &#8212;</span>
    <button class="qshuf" onclick="shuffle()">&#8635; Shuffle</button>
  </div>
</div>
<script>
const WORKER_URL='';
const SAMPLE=[
  {text:'문장은 기억이 선택한 형태다.',source:'잇재 아카이브',note:''},
  {text:'읽는다는 것은, 쓰인 것을 빌려 자신을 읽는 일이다.',source:'잇재 아카이브',note:''},
  {text:'어떤 날들은 문장 한 줄로 기억된다.',source:'잇재 아카이브',note:''},
  {text:'좋은 문장은 처음 만났을 때부터 오래된 것처럼 느껴진다.',source:'잇재 아카이브',note:''},
  {text:'쓰는 사람은 세계를 두 번 산다.\n한 번은 경험으로, 한 번은 언어로.',source:'잇재 아카이브',note:''},
];
let qs=[...SAMPLE],idx=0;
function render(){const q=qs[idx];if(!q)return;const qt=document.getElementById('qt'),qs2=document.getElementById('qs');qt.classList.add('fade');qs2.classList.add('fade');setTimeout(()=>{document.getElementById('qt').textContent=q.text||'';document.getElementById('qsrc').textContent=q.source?`— ${q.source}`:'';document.getElementById('qn').textContent=q.note?`${q.note} · `:'';document.getElementById('ctr').textContent=`${String(idx+1).padStart(2,'0')} / ${String(qs.length).padStart(2,'0')}`;qt.classList.remove('fade');qs2.classList.remove('fade');},280);document.getElementById('bp').disabled=idx===0;document.getElementById('bn').disabled=idx===qs.length-1;}
function go(d){idx=Math.max(0,Math.min(qs.length-1,idx+d));render();}
function shuffle(){idx=Math.floor(Math.random()*qs.length);render();}
async function fetchWorker(){if(!WORKER_URL)return;try{const r=await fetch(WORKER_URL),d=await r.json();if(Array.isArray(d.quotes)&&d.quotes.length){qs=d.quotes;idx=Math.floor(Math.random()*qs.length);const b=document.getElementById('badge');b.textContent='live';b.classList.add('live');render();}}catch(e){console.warn(e);}}
idx=Math.floor(Math.random()*qs.length);render();fetchWorker();
</script></body></html>
