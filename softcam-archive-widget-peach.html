<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoftCam Archive Widget - peach</title>
  <style>
    :root {
      --paper: #fffaf6;
      --cream: #fff0e6;
      --pink: #f7d9d0;
      --blue: #e9f0ef;
      --green: #e7ead7;
      --yellow: #f8e4aa;
      --line: #5d4f49;
      --muted: #8d8178;
      --soft-line: rgba(93, 79, 73, 0.18);
      --shadow: rgba(93, 79, 73, 0.10);
      --screen: #fff9f4;
      --dark: #5d4f49;
      --selected: #fff0dd;
      --selected-line: #d9a56e;
      --lcd-bg: #f5ede7;
      --lcd-text: #756861;
      --lcd-muted: #91847d;
      --lcd-line: rgba(93,79,73,0.26);
      --focus-line: rgba(93,79,73,0.40);
      --timestamp-bg: rgba(255,255,255,0.70);
      --timestamp-text: #665a54;
      --photo-bg: #fff0e6;
      --photo-border: rgba(93,79,73,0.12);
      --card-bg: rgba(255,255,255,0.60);
      --tag-bg: rgba(248,228,170,0.42);
      --button-bg: rgba(247,217,208,0.72);
      --shutter-bg: rgba(247,217,208,0.86);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f7f3ea;
      color: var(--line);
      font-family: "SF Mono", "IBM Plex Mono", "Roboto Mono", "Space Mono",
        ui-monospace, Menlo, Consolas, monospace;
    }

    .shell {
      width: min(360px, 100vw);
      padding: 14px;
    }

    .camera {
      position: relative;
      width: 100%;
      padding: 17px 18px 20px;
      border: 1.5px solid rgba(79, 86, 81, 0.64);
      border-radius: 28px;
      background: var(--paper);
      box-shadow: 0 18px 44px var(--shadow);
      overflow: hidden;
    }

    .camera::before {
      content: "";
      position: absolute;
      inset: 9px;
      border: 1px solid rgba(79, 86, 81, 0.14);
      border-radius: 22px;
      pointer-events: none;
    }

    .top {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 54px 1fr 48px;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .view-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 8px;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .dot {
      width: 10px;
      height: 10px;
      border: 1px solid rgba(79,86,81,0.36);
      border-radius: 999px;
      background: var(--pink);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.5);
    }

    .brand {
      text-align: center;
    }

    .eyebrow {
      margin-bottom: 3px;
      font-size: 8px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: #49654f;
    }

    .shutter {
      justify-self: end;
      width: 42px;
      height: 28px;
      border: 1.3px solid rgba(79,86,81,0.32);
      border-radius: 999px;
      background: var(--shutter-bg);
      box-shadow: inset 0 2px 5px rgba(255,255,255,0.8);
      cursor: pointer;
      color: var(--line);
      font: inherit;
      font-size: 9px;
    }

    .screen {
      position: relative;
      z-index: 1;
      overflow: hidden;
      padding: 10px;
      border: 1.5px solid rgba(79, 86, 81, 0.38);
      border-radius: 18px;
      background: var(--lcd-bg);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.18),
        inset 0 -10px 18px rgba(79,86,81,0.045);
    }

    .lcd-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      color: var(--lcd-text);
      font-size: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .battery {
      width: 24px;
      height: 10px;
      border: 1px solid var(--lcd-line);
      border-radius: 2px;
      padding: 1px;
      position: relative;
    }

    .battery::after {
      content: "";
      position: absolute;
      right: -4px;
      top: 2px;
      width: 2px;
      height: 4px;
      background: var(--card-bg);
      border-radius: 0 1px 1px 0;
    }

    .battery span {
      display: block;
      width: 72%;
      height: 100%;
      border-radius: 1px;
      background: var(--yellow);
    }

    .photo-wrap {
      position: relative;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      border-radius: 11px;
      background: var(--photo-bg);
      border: 1px solid var(--photo-border);
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      filter: saturate(0.9) contrast(0.98);
    }

    .empty {
      height: 100%;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--lcd-muted);
      font-size: 9px;
      line-height: 1.55;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .focus-box {
      position: absolute;
      inset: 22%;
      border: 1px solid var(--focus-line);
      border-radius: 7px;
      opacity: 0.75;
      pointer-events: none;
    }

    .focus-box::before,
    .focus-box::after {
      content: "";
      position: absolute;
      width: 16px;
      height: 1px;
      background: var(--focus-line);
      top: 50%;
      transform: translateY(-50%);
    }

    .focus-box::before { left: -22px; }
    .focus-box::after { right: -22px; }

    .timestamp {
      position: absolute;
      left: 9px;
      bottom: 8px;
      padding: 3px 5px;
      border-radius: 5px;
      background: var(--timestamp-bg);
      color: var(--timestamp-text);
      font-size: 8px;
      letter-spacing: 0.04em;
    }

    .meta-card {
      position: relative;
      z-index: 1;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid rgba(79, 86, 81, 0.18);
      border-radius: 14px;
      background: var(--card-bg);
    }

    .meta-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .title {
      min-width: 0;
      margin: 0;
      font-size: 13px;
      line-height: 1.35;
      font-weight: 500;
      color: var(--line);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .count {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 9px;
    }

    .caption {
      margin: 0 0 10px;
      min-height: 28px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.5;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .tag {
      padding: 4px 7px;
      border: 1px solid rgba(79, 86, 81, 0.14);
      border-radius: 999px;
      background: var(--tag-bg);
      color: #6b6659;
      font-size: 8px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .controls {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      gap: 10px;
      align-items: center;
      margin-top: 14px;
    }

    .nav-btn,
    .gallery-btn {
      border: 1px solid rgba(79, 86, 81, 0.22);
      background: rgba(255,255,255,0.6);
      color: var(--line);
      font: inherit;
      cursor: pointer;
    }

    .nav-btn {
      width: 44px;
      height: 38px;
      border-radius: 12px;
      font-size: 14px;
    }

    .gallery-btn {
      height: 38px;
      border-radius: 12px;
      background: var(--button-bg);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .thumbs {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 6px;
      margin-top: 12px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .thumb {
      flex: 0 0 auto;
      width: 44px;
      height: 34px;
      padding: 0;
      border: 1px solid rgba(79,86,81,0.16);
      border-radius: 8px;
      overflow: hidden;
      background: var(--cream);
      opacity: 0.68;
      cursor: pointer;
    }

    .thumb.active {
      opacity: 1;
      border-color: var(--selected-line);
      box-shadow: 0 0 0 2px rgba(247,235,168,0.48);
    }

    .thumb img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .status {
      position: relative;
      z-index: 1;
      margin-top: 10px;
      min-height: 12px;
      text-align: center;
      color: var(--muted);
      font-size: 8px;
      letter-spacing: 0.05em;
    }

    @media (max-width: 340px) {
      .shell { padding: 8px; }
      .camera { padding: 16px; }
      h1 { font-size: 17px; }
      .top { grid-template-columns: 46px 1fr 44px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="camera" aria-label="SoftCam Archive Widget">
      <header class="top">
        <div class="view-dot"><span class="dot"></span><span>rec</span></div>
        <div class="brand">
          <div class="eyebrow">notion db</div>
          <h1>SoftCam</h1>
        </div>
        <button class="shutter" id="shuffleBtn" type="button">snap</button>
      </header>

      <section class="screen">
        <div class="lcd-head">
          <span id="modeText">preview</span>
          <div class="battery"><span></span></div>
        </div>

        <div class="photo-wrap" id="photoWrap">
          <div class="empty">connect<br />notion db</div>
          <div class="focus-box"></div>
          <div class="timestamp" id="timestamp">--.--.--</div>
        </div>
      </section>

      <section class="meta-card">
        <div class="meta-top">
          <p class="title" id="photoTitle">Image archive</p>
          <span class="count" id="countText">00 / 00</span>
        </div>
        <p class="caption" id="captionText">Preview images from your Notion database.</p>
        <div class="tag-row" id="tagRow">
          <span class="tag">notion</span>
          <span class="tag">image</span>
        </div>
      </section>

      <div class="controls">
        <button class="nav-btn" id="prevBtn" type="button">‹</button>
        <button class="gallery-btn" id="openBtn" type="button">open page</button>
        <button class="nav-btn" id="nextBtn" type="button">›</button>
      </div>

      <div class="thumbs" id="thumbs"></div>
      <div class="status" id="status">demo mode · notion api ready</div>
    </section>
  </main>

  <script>
    /*
      Notion DB integration plan:
      1. Create a server route: /api/notion-images
      2. Server route calls Notion API with NOTION_TOKEN and DATABASE_ID
      3. Return simplified data:
         [
           {
             title: "reference 01",
             imageUrl: "https://...",
             caption: "short memo",
             date: "2026.06.06",
             tags: ["poster", "mood"],
             notionUrl: "https://notion.so/..."
           }
         ]
      4. Replace DEMO_IMAGES with fetched data.
    */

    const DEMO_IMAGES = [
      {
        title: "blue room study",
        imageUrl: "https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=900&q=80",
        caption: "quiet color, soft light, archived for mood reference.",
        date: "2026.06.06",
        tags: ["mood", "room"],
        notionUrl: "https://www.notion.so"
      },
      {
        title: "flower poster ref",
        imageUrl: "https://images.unsplash.com/photo-1490750967868-88aa4486c946?auto=format&fit=crop&w=900&q=80",
        caption: "flat floral feeling with a small nostalgic texture.",
        date: "2026.06.02",
        tags: ["flower", "poster"],
        notionUrl: "https://www.notion.so"
      },
      {
        title: "paper object",
        imageUrl: "https://images.unsplash.com/photo-1517971129774-8a2b38fa128e?auto=format&fit=crop&w=900&q=80",
        caption: "simple object layout for notion widget direction.",
        date: "2026.05.29",
        tags: ["paper", "layout"],
        notionUrl: "https://www.notion.so"
      },
      {
        title: "desk snapshot",
        imageUrl: "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=900&q=80",
        caption: "small digital archive mood for daily collecting.",
        date: "2026.05.21",
        tags: ["desk", "archive"],
        notionUrl: "https://www.notion.so"
      }
    ];

    let images = [...DEMO_IMAGES];
    let current = 0;

    const $ = (id) => document.getElementById(id);

    function formatDate(date) {
      if (!date) return "--.--.--";
      return date.replaceAll("-", ".").slice(2);
    }

    function render() {
      const item = images[current];

      if (!item) {
        $("photoWrap").innerHTML = `
          <div class="empty">connect<br />notion db</div>
          <div class="focus-box"></div>
          <div class="timestamp">--.--.--</div>
        `;
        $("photoTitle").textContent = "Image archive";
        $("captionText").textContent = "Preview images from your Notion database.";
        $("countText").textContent = "00 / 00";
        $("tagRow").innerHTML = `<span class="tag">notion</span><span class="tag">image</span>`;
        return;
      }

      $("photoWrap").innerHTML = `
        <img src="${item.imageUrl}" alt="${escapeHtml(item.title)}" />
        <div class="focus-box"></div>
        <div class="timestamp">${formatDate(item.date)}</div>
      `;

      $("photoTitle").textContent = item.title;
      $("captionText").textContent = item.caption || "No caption.";
      $("countText").textContent = `${String(current + 1).padStart(2, "0")} / ${String(images.length).padStart(2, "0")}`;
      $("tagRow").innerHTML = (item.tags || [])
        .slice(0, 4)
        .map(tag => `<span class="tag">${escapeHtml(tag)}</span>`)
        .join("");

      renderThumbs();
    }

    function renderThumbs() {
      const wrap = $("thumbs");
      wrap.innerHTML = "";

      images.forEach((item, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `thumb ${index === current ? "active" : ""}`;
        btn.innerHTML = `<img src="${item.imageUrl}" alt="">`;
        btn.addEventListener("click", () => {
          current = index;
          render();
        });
        wrap.appendChild(btn);
      });
    }

    function next() {
      if (!images.length) return;
      current = (current + 1) % images.length;
      render();
    }

    function prev() {
      if (!images.length) return;
      current = (current - 1 + images.length) % images.length;
      render();
    }

    function shuffle() {
      if (!images.length) return;
      if (images.length === 1) return;
      let nextIndex = current;
      while (nextIndex === current) {
        nextIndex = Math.floor(Math.random() * images.length);
      }
      current = nextIndex;
      $("status").textContent = "snap";
      render();
    }

    function openPage() {
      const item = images[current];
      if (!item?.notionUrl) return;
      window.open(item.notionUrl, "_blank", "noopener,noreferrer");
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    /*
      Future API connection example:

      async function loadFromNotion() {
        const response = await fetch("/api/notion-images");
        const data = await response.json();
        images = data.images || [];
        current = 0;
        render();
      }

      loadFromNotion();
    */

    $("prevBtn").addEventListener("click", prev);
    $("nextBtn").addEventListener("click", next);
    $("shuffleBtn").addEventListener("click", shuffle);
    $("openBtn").addEventListener("click", openPage);

    render();
  </script>
</body>
</html>
