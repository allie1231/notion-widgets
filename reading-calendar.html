<!DOCTYPE html><html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reading Calendar</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:transparent;display:flex;justify-content:center;align-items:flex-start;padding:16px;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif}
.win{border-radius:12px;border:.5px solid rgba(0,0,0,.12);background:#fff;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.05)}
.tb{background:#EBEBEB;padding:8px 12px 7px;display:flex;align-items:center;border-bottom:.5px solid rgba(0,0,0,.1)}
.tls{display:flex;gap:5px}.tl{width:11px;height:11px;border-radius:50%}
.wt{flex:1;font-size:12px;font-weight:500;color:#3C3C3C;text-align:center}.sp{width:42px}
.row{border-bottom:.5px solid rgba(0,0,0,.06)}.row:last-child{border-bottom:none}
.win{width:272px}
.mhdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:.5px solid rgba(0,0,0,.07)}
.mo{font-size:16px;font-weight:500;color:#1C1C1E}.yr{font-size:13px;color:#8E8E93;margin-left:6px}
.nav{background:none;border:none;font-size:16px;color:#007AFF;cursor:pointer;padding:2px 6px}
.cal{padding:8px 12px}
.dhr{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.dh{font-size:10px;color:#8E8E93;text-align:center;padding:2px 0;font-weight:500}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:11px;color:#1C1C1E;cursor:pointer;border-radius:50%;transition:background .1s}
.cell:not(.empty):hover{background:rgba(0,0,0,.05)}
.cell.empty{cursor:default}
.cell.read{background:#FF6B8A;color:#fff}
.cell.today{border:1.5px solid #007AFF;color:#007AFF;font-weight:600}
.cell.read.today{background:#FF6B8A;border-color:#FF6B8A;color:#fff}
.cell.we{color:#8E8E93}.cell.read.we{color:#fff}
.foot{padding:8px 14px 10px;border-top:.5px solid rgba(0,0,0,.07);display:flex;justify-content:space-between;align-items:center}
.fc{font-size:11px;color:#636366}.fc strong{color:#FF6B8A;font-weight:500}
.fhint{font-size:10px;color:#C7C7CC}
</style></head><body>
<div class="win">
  <div class="tb"><div class="tls"><div class="tl" style="background:#FF5F57"></div><div class="tl" style="background:#FFBD2E"></div><div class="tl" style="background:#28C840"></div></div><div class="wt">Reading Calendar</div><div class="sp"></div></div>
  <div class="mhdr"><button class="nav" onclick="move(-1)">&#8249;</button><div><span class="mo" id="mo">June</span><span class="yr" id="yr">2026</span></div><button class="nav" onclick="move(+1)">&#8250;</button></div>
  <div class="cal"><div class="dhr"><div class="dh">Mo</div><div class="dh">Tu</div><div class="dh">We</div><div class="dh">Th</div><div class="dh">Fr</div><div class="dh" style="color:#C7C7CC">Sa</div><div class="dh" style="color:#C7C7CC">Su</div></div><div class="grid" id="grid"></div></div>
  <div class="foot"><div class="fc"><strong id="cnt">0</strong> days read</div><div class="fhint">tap to mark</div></div>
</div>
<script>
const MO=['January','February','March','April','May','June','July','August','September','October','November','December'];
const n=new Date();let cY=n.getFullYear(),cM=n.getMonth()+1;
const key=(y,m)=>`rc_${y}_${m}`;
const ld=(y,m)=>{const r=localStorage.getItem(key(y,m));return r?new Set(JSON.parse(r)):new Set();};
const sv=(y,m,d)=>localStorage.setItem(key(y,m),JSON.stringify([...d]));
function toggle(y,m,d){const s=ld(y,m);s.has(d)?s.delete(d):s.add(d);sv(y,m,s);render();}
function render(){
  const y=cY,m=cM,days=ld(y,m),today=new Date(),isCur=today.getFullYear()===y&&today.getMonth()+1===m,todayD=isCur?today.getDate():-1;
  document.getElementById('yr').textContent=y;document.getElementById('mo').textContent=MO[m-1];document.getElementById('cnt').textContent=days.size;
  const fd=new Date(y,m-1,1).getDay(),ld2=new Date(y,m,0).getDate(),off=fd===0?6:fd-1;
  let h='';for(let i=0;i<off;i++)h+='<div class="cell empty"></div>';
  for(let d=1;d<=ld2;d++){const c=(off+d-1)%7,we=c===5||c===6,rd=days.has(d),td=d===todayD;h+=`<div class="${['cell',we?'we':'',rd?'read':'',td?'today':''].filter(Boolean).join(' ')}" onclick="toggle(${y},${m},${d})">${d}</div>`;}
  document.getElementById('grid').innerHTML=h;
}
function move(d){cM+=d;if(cM>12){cM=1;cY++;}if(cM<1){cM=12;cY--;}render();}
render();
</script></body></html>
