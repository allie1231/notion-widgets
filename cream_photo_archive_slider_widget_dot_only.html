<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cream Gallery Widget</title>
  <style>
    :root {
      --cream: #EEEFE8;
      --cream-light: #F8F8F2;
      --cream-deep: #D9DAD2;
      --screen: #DDE2E1;
      --line: rgba(74, 78, 79, .24);
      --ink: rgba(54, 58, 60, .68);
      --pink: #E9ACBB;
      --blue: #C9D5E5;
      --green: #8FBC93;
      --shadow: rgba(38, 40, 42, .12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: "Helvetica Neue", Arial, system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      overflow: hidden;
    }

    .widget {
      width: min(440px, 94vw);
      background: transparent;
    }

    .window {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / .78;
      border-radius: 34px;
      background: var(--cream);
      border: 1px solid var(--line);
      box-shadow:
        0 14px 28px var(--shadow),
        inset 0 2px 4px rgba(255,255,255,.8),
        inset 0 -10px 18px rgba(95,98,100,.08);
      padding: 24px 28px 32px;
      overflow: visible;
    }

    .window::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(0,0,0,.018) 0,
          rgba(0,0,0,.018) 1px,
          transparent 1px,
          transparent 4px
        );
      opacity: .45;
      mix-blend-mode: multiply;
    }

    .screen {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 78%;
      border-radius: 28px;
      overflow: hidden;
      background: var(--screen);
      border: 1px solid rgba(74, 78, 79, .16);
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transform: scale(1.025);
      transition: opacity .7s ease, transform 1.1s ease;
      background-size: cover;
      background-position: center;
    }

    .slide.active {
      opacity: 1;
      transform: scale(1);
    }

    .screen::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255,255,255,.18), transparent 28%),
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,.05) 0,
          rgba(255,255,255,.05) 1px,
          transparent 1px,
          transparent 3px
        );
      mix-blend-mode: screen;
    }

    .dock {
      position: absolute;
      z-index: 2;
      left: 50%;
      bottom: 57px;
      transform: translateX(-50%);
      width: min(220px, 58%);
      height: 18px;
      border-radius: 999px 999px 5px 5px;
      background: var(--cream-light);
      border: 1px solid rgba(74, 78, 79, .14);
      box-shadow: 0 -2px 0 rgba(255,255,255,.5);
    }

    .bottom {
      position: relative;
      z-index: 2;
      height: 24%;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 10px 7px 0;
    }

    .pink-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--pink);
      border: 1px solid rgba(74, 78, 79, .12);
      margin-left: 6px;
    }

    .dots {
      position: absolute;
      z-index: 3;
      left: 50%;
      bottom: 45px;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(74,78,79,.22);
      transition: width .25s ease, background .25s ease;
    }

    .dot.active {
      width: 18px;
      border-radius: 999px;
      background: rgba(74,78,79,.36);
    }

    @media (max-width: 420px) {
      body {
        padding: 12px;
      }

      .window {
        border-radius: 28px;
        padding: 24px 22px 30px;
      }

      .screen {
        border-radius: 23px;
      }

      .dock {
        bottom: 53px;
        height: 16px;
      }

      .dots {
        bottom: 42px;
      }

    }
  </style>
</head>
<body>
  <main class="widget">
    <section class="window" aria-label="image gallery widget">
      <div class="screen" id="screen"></div>

      <div class="dock" aria-hidden="true"></div>
      <div class="dots" id="dots" aria-hidden="true"></div>

      <div class="bottom" aria-hidden="true">
        <div class="pink-dot"></div>
      </div>
    </section>
  </main>

  <script>
    /*
      Replace these image URLs with direct image URLs.
      For Notion DB images, the recommended final setup is:
      Notion DB → small API/serverless function → this images array.
    */
    const images = [
      "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=900&q=80",
      "https://images.unsplash.com/photo-1494976388531-d1058494cdd8?auto=format&fit=crop&w=900&q=80",
      "https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=900&q=80"
    ];

    const screen = document.getElementById("screen");
    const dots = document.getElementById("dots");
    let current = 0;

    function init() {
      images.forEach((url, index) => {
        const slide = document.createElement("div");
        slide.className = "slide";
        slide.style.backgroundImage = `url("${url}")`;
        if (index === 0) slide.classList.add("active");
        screen.appendChild(slide);

        const dot = document.createElement("span");
        dot.className = "dot";
        if (index === 0) dot.classList.add("active");
        dots.appendChild(dot);
      });
    }

    function showSlide(index) {
      const slides = document.querySelectorAll(".slide");
      const dotItems = document.querySelectorAll(".dot");

      slides[current].classList.remove("active");
      dotItems[current].classList.remove("active");

      current = index;

      slides[current].classList.add("active");
      dotItems[current].classList.add("active");
    }

    function nextSlide() {
      const next = (current + 1) % images.length;
      showSlide(next);
    }

    init();
    setInterval(nextSlide, 2600);
  </script>
</body>
</html>
