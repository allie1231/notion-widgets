<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPod Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Chicago:wght@400&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 1.5rem;
  }

  .ipod {
    width: 200px;
    background: linear-gradient(180deg, #f0f0ec 0%, #dcdcd4 40%, #d0d0c8 100%);
    border-radius: 28px;
    padding: 14px 14px 20px;
    box-shadow:
      inset 0 2px 4px rgba(255,255,255,0.8),
      inset 0 -2px 4px rgba(0,0,0,0.15),
      0 12px 40px rgba(0,0,0,0.35),
      0 4px 8px rgba(0,0,0,0.2),
      2px 0 0 #c8c8c0,
      -2px 0 0 #e8e8e0;
    position: relative;
  }

  /* screen */
  .screen-frame {
    background: #2a2a28;
    border-radius: 8px;
    padding: 3px;
    margin-bottom: 12px;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
  }
  .screen {
    background: #9ab8c8;
    border-radius: 6px;
    height: 80px;
    padding: 6px 8px;
    position: relative;
    overflow: hidden;
  }

  /* screen states */
  .screen.mode-focus { background: #9ab8c8; }
  .screen.mode-break { background: #b8c8a8; }
  .screen.mode-done  { background: #c8c8a8; }

  .menu-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  .menu-title {
    font-family: 'Silkscreen', monospace;
    font-size: 8px;
    color: #1a2a38;
    letter-spacing: 0.1em;
  }
  .battery {
    font-family: 'Silkscreen', monospace;
    font-size: 7px;
    color: #1a2a38;
  }

  .track-info {
    font-family: 'Silkscreen', monospace;
    font-size: 7px;
    color: #1a2a38;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .big-time {
    font-family: 'Silkscreen', monospace;
    font-size: 22px;
    color: #0a1a28;
    letter-spacing: 0.05em;
    line-height: 1;
    text-align: center;
    margin-bottom: 3px;
  }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .time-small {
    font-family: 'Silkscreen', monospace;
    font-size: 6px;
    color: #3a4a58;
    min-width: 22px;
  }
  .prog-bar {
    flex: 1;
    height: 4px;
    background: rgba(0,0,0,0.2);
    border-radius: 2px;
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    background: #1a3a58;
    border-radius: 2px;
    transition: width 0.5s linear;
  }
  .mode-break .prog-fill { background: #2a5a2a; }

  /* scanlines on screen */
  .screen::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
  }

  /* click wheel */
  .wheel-wrap {
    position: relative;
    width: 140px;
    height: 140px;
    margin: 0 auto;
  }

  .wheel {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: radial-gradient(ellipse at 35% 30%, #e8e8e0, #c8c8be 50%, #b8b8b0);
    box-shadow:
      inset 0 2px 4px rgba(255,255,255,0.6),
      inset 0 -2px 4px rgba(0,0,0,0.2),
      0 2px 8px rgba(0,0,0,0.25);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* center button */
  .center-btn {
    width: 54px;
    height: 54px;
    border-radius: 50%;
    background: radial-gradient(ellipse at 35% 30%, #f0f0ec, #d8d8d0);
    box-shadow:
      inset 0 1px 3px rgba(255,255,255,0.7),
      inset 0 -1px 3px rgba(0,0,0,0.15),
      0 1px 4px rgba(0,0,0,0.2);
    cursor: pointer;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s;
    z-index: 2;
  }
  .center-btn:active { transform: scale(0.96); }
  .center-icon {
    font-family: 'Silkscreen', monospace;
    font-size: 8px;
    color: #555548;
    letter-spacing: 0.05em;
    pointer-events: none;
  }

  /* wheel labels */
  .wheel-label {
    position: absolute;
    font-family: 'Silkscreen', monospace;
    font-size: 6.5px;
    color: #555548;
    cursor: pointer;
    user-select: none;
    padding: 8px;
  }
  .wheel-label:hover { color: #222218; }
  .wheel-label.top    { top: 5px;  left: 50%; transform: translateX(-50%); }
  .wheel-label.bottom { bottom: 5px; left: 50%; transform: translateX(-50%); }
  .wheel-label.left   { left: 6px;  top: 50%; transform: translateY(-50%); }
  .wheel-label.right  { right: 6px; top: 50%; transform: translateY(-50%); }

  /* session counter */
  .sessions {
    display: flex;
    justify-content: center;
    gap: 5px;
    margin-top: 8px;
  }
  .session-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #b8b8b0;
    border: 1px solid #9a9a90;
  }
  .session-dot.done { background: #888878; }
  .session-dot.active { background: #555548; }
</style>
</head>
<body>

<div class="ipod">
  <div class="screen-frame">
    <div class="screen mode-focus" id="screen">
      <div class="menu-bar">
        <span class="menu-title" id="mode-label">FOCUS</span>
        <span class="battery" id="session-info">#1 / 4</span>
      </div>
      <div class="track-info" id="track-info">deep work · studio itjae</div>
      <div class="big-time" id="big-time">25:00</div>
      <div class="progress-row">
        <span class="time-small" id="elapsed">0:00</span>
        <div class="prog-bar"><div class="prog-fill" id="prog" style="width:0%"></div></div>
        <span class="time-small" id="total-t" style="text-align:right">25:00</span>
      </div>
    </div>
  </div>

  <div class="wheel-wrap">
    <div class="wheel">
      <span class="wheel-label top"    onclick="handleMenu()">MENU</span>
      <span class="wheel-label bottom" onclick="handleFwd()">▶▶</span>
      <span class="wheel-label left"   onclick="handleRew()">◀◀</span>
      <span class="wheel-label right"  onclick="handlePlay()">▶ II</span>
      <button class="center-btn" onclick="handleCenter()">
        <span class="center-icon" id="center-icon">OK</span>
      </button>
    </div>
  </div>

  <div class="sessions" id="sessions"></div>
</div>

<script>
const FOCUS_MINS = 25;
const BREAK_MINS = 5;
const LONG_BREAK_MINS = 15;
const SESSIONS = 4;

let mode        = 'idle';   // idle | focus | break | longbreak
let running     = false;
let elapsed     = 0;
let totalSecs   = FOCUS_MINS * 60;
let sessionNum  = 0;
let completedSessions = 0;
let ticker      = null;
let trackNames  = ['deep work', 'design sprint', 'weekly review', 'inbox zero', 'side project'];
let trackIdx    = 0;

function fmt(s) {
  const m = Math.floor(s / 60);
  const ss = s % 60;
  return `${m}:${String(ss).padStart(2,'0')}`;
}

function pct() { return totalSecs > 0 ? (elapsed / totalSecs) * 100 : 0; }

function updateScreen() {
  const remaining = totalSecs - elapsed;
  document.getElementById('big-time').textContent = fmt(remaining);
  document.getElementById('elapsed').textContent  = fmt(elapsed);
  document.getElementById('total-t').textContent  = fmt(totalSecs);
  document.getElementById('prog').style.width     = pct() + '%';
  document.getElementById('session-info').textContent = `#${sessionNum+1} / ${SESSIONS}`;

  const screen = document.getElementById('screen');
  const modeLabel = document.getElementById('mode-label');
  screen.className = 'screen';

  if (mode === 'focus') {
    screen.classList.add('mode-focus');
    modeLabel.textContent = '▶ FOCUS';
  } else if (mode === 'break' || mode === 'longbreak') {
    screen.classList.add('mode-break');
    modeLabel.textContent = '☕ BREAK';
  } else {
    modeLabel.textContent = running ? '▶ FOCUS' : '  FOCUS';
  }

  document.getElementById('center-icon').textContent = running ? 'II' : '▶';
  document.getElementById('track-info').textContent  =
    `${trackNames[trackIdx % trackNames.length]} · studio itjae`;

  renderSessions();
}

function renderSessions() {
  const el = document.getElementById('sessions');
  el.innerHTML = '';
  for (let i = 0; i < SESSIONS; i++) {
    const d = document.createElement('div');
    d.className = 'session-dot';
    if (i < completedSessions) d.classList.add('done');
    if (i === sessionNum && running) d.classList.add('active');
    el.appendChild(d);
  }
}

function startFocus() {
  mode = 'focus';
  elapsed = 0;
  totalSecs = FOCUS_MINS * 60;
  running = true;
  clearInterval(ticker);
  ticker = setInterval(tick, 1000);
  updateScreen();
}

function startBreak(isLong) {
  mode = isLong ? 'longbreak' : 'break';
  elapsed = 0;
  totalSecs = (isLong ? LONG_BREAK_MINS : BREAK_MINS) * 60;
  running = true;
  clearInterval(ticker);
  ticker = setInterval(tick, 1000);
  updateScreen();
}

function tick() {
  elapsed++;
  if (elapsed >= totalSecs) {
    clearInterval(ticker);
    running = false;
    if (mode === 'focus') {
      completedSessions++;
      sessionNum++;
      if (sessionNum >= SESSIONS) { sessionNum = 0; completedSessions = 0; mode = 'idle'; }
      else {
        const isLong = sessionNum % 4 === 0;
        setTimeout(() => startBreak(isLong), 500);
      }
    } else {
      mode = 'focus';
      setTimeout(() => startFocus(), 500);
    }
  }
  updateScreen();
}

function handleCenter() {
  if (!running && mode === 'idle') { startFocus(); return; }
  running = !running;
  if (running) {
    ticker = setInterval(tick, 1000);
  } else {
    clearInterval(ticker);
  }
  updateScreen();
}

function handleMenu() {
  // reset
  clearInterval(ticker);
  running = false;
  mode = 'idle';
  elapsed = 0;
  totalSecs = FOCUS_MINS * 60;
  updateScreen();
}

function handlePlay() { handleCenter(); }

function handleFwd() {
  trackIdx++;
  updateScreen();
}

function handleRew() {
  elapsed = Math.max(0, elapsed - 30);
  updateScreen();
}

updateScreen();
</script>
</body>
</html>
