<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VHS Clock</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0c0c0a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
    position: relative;
  }
  /* scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.18) 3px,
      rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
    z-index: 10;
  }
  /* vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
    z-index: 9;
  }
  .wrap {
    position: relative;
    z-index: 2;
    text-align: left;
    padding: 2rem 2.5rem;
    width: 100%;
    max-width: 480px;
  }
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2.5rem;
  }
  .rec {
    display: flex;
    align-items: center;
    gap: 7px;
    color: #e83030;
    font-size: 11px;
    letter-spacing: 0.35em;
    font-weight: 700;
  }
  .rec-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #e83030;
    animation: blink 1.1s ease-in-out infinite;
    box-shadow: 0 0 8px rgba(232,48,48,0.7);
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.1; }
  }
  .ch {
    font-size: 11px;
    letter-spacing: 0.25em;
    color: #3a3a36;
  }
  .time-display {
    position: relative;
    margin-bottom: 1rem;
  }
  .time {
    font-size: clamp(4rem, 15vw, 7.5rem);
    color: #ddddd5;
    letter-spacing: 0.04em;
    line-height: 1;
    font-weight: 400;
    text-shadow: 0 0 30px rgba(220,220,210,0.25), 0 0 1px rgba(220,220,210,0.6);
  }
  /* occasional glitch */
  .time.glitch {
    animation: glitch 0.08s steps(1) forwards;
  }
  @keyframes glitch {
    0%   { transform: translateX(0);   color: #ddddd5; }
    25%  { transform: translateX(-4px); color: #ff6666; clip-path: inset(30% 0 50% 0); }
    50%  { transform: translateX(4px);  color: #66ffee; clip-path: inset(60% 0 10% 0); }
    75%  { transform: translateX(0);    color: #ddddd5; clip-path: none; }
    100% { transform: translateX(0);    color: #ddddd5; }
  }
  .bottom-bar {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-top: 1.2rem;
  }
  .date {
    font-size: 12px;
    color: #4a4a44;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .sp {
    font-size: 10px;
    color: #2e2e2a;
    letter-spacing: 0.15em;
  }
  /* noise overlay SVG */
  .noise-layer {
    position: fixed;
    inset: 0;
    opacity: 0.04;
    pointer-events: none;
    z-index: 1;
  }
  .counter {
    font-size: 11px;
    color: #2a2a26;
    letter-spacing: 0.2em;
    margin-bottom: 1rem;
  }
  .tape-counter {
    font-size: 13px;
    color: #383832;
    letter-spacing: 0.15em;
    font-feature-settings: 'tnum';
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>

<svg class="noise-layer" viewBox="0 0 300 300" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch"/></filter>
  <rect width="100%" height="100%" filter="url(#n)" opacity="1"/>
</svg>

<div class="wrap">
  <div class="top-bar">
    <div class="rec"><div class="rec-dot"></div>REC</div>
    <div class="ch">SP · CH04</div>
  </div>
  <div class="counter" id="counter">00:00:00:00</div>
  <div class="time-display">
    <div class="time" id="time">00:00:00</div>
  </div>
  <div class="bottom-bar">
    <div class="date" id="date">MON 01 JAN 2025</div>
    <div class="tape-counter" id="tape">▶ 0000</div>
  </div>
</div>

<script>
  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  let frameCount = 0;
  let lastGlitch = 0;

  function pad(n, len=2) { return String(n).padStart(len, '0'); }

  function update() {
    const now = new Date();
    const h = pad(now.getHours());
    const m = pad(now.getMinutes());
    const s = pad(now.getSeconds());
    const ms = pad(Math.floor(now.getMilliseconds() / 10));

    document.getElementById('time').textContent = `${h}:${m}:${s}`;
    document.getElementById('counter').textContent = `${h}:${m}:${s}:${ms}`;
    document.getElementById('date').textContent =
      `${days[now.getDay()]} ${pad(now.getDate())} ${months[now.getMonth()]} ${now.getFullYear()}`;

    frameCount++;
    document.getElementById('tape').textContent = `▶ ${pad(frameCount, 4)}`;

    // random glitch every ~8-15s
    const elapsed = Date.now() - lastGlitch;
    if (elapsed > 8000 && Math.random() < 0.005) {
      const el = document.getElementById('time');
      el.classList.add('glitch');
      lastGlitch = Date.now();
      setTimeout(() => el.classList.remove('glitch'), 120);
    }
  }

  update();
  setInterval(update, 100);
</script>
</body>
</html>
