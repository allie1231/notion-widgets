<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg:    #f5f0e8;
    --paper: #faf7f2;
    --ink:   #1e1a14;
    --mid:   #7a7060;
    --faint: #ccc5b5;
    --accent:#5a4030;
    --warm:  #c8885a;
    --leaf:  #6a8a5a;
  }
  body {
    background: var(--bg);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 0;
    color: var(--ink);
  }

  /* tab nav */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--faint);
    background: var(--paper);
    padding: 0 1.2rem;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .tab {
    padding: 0.8rem 0.8rem 0.7rem;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--mid);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
    user-select: none;
  }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .view { display: none; padding: 1.2rem; }
  .view.active { display: block; }

  /* ── CURRENTLY READING ── */
  .now-reading-title {
    font-family: 'DM Serif Display', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--mid);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .book-card {
    display: flex;
    gap: 0.8rem;
    padding: 0.8rem;
    background: var(--paper);
    border: 1px solid var(--faint);
    margin-bottom: 0.6rem;
    position: relative;
  }
  .book-spine {
    width: 8px;
    flex-shrink: 0;
    background: var(--accent);
    border-radius: 1px;
  }
  .book-info { flex: 1; min-width: 0; }
  .book-title {
    font-family: 'DM Serif Display', serif;
    font-size: 14px;
    color: var(--ink);
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .book-author {
    font-size: 9px;
    color: var(--mid);
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }
  .book-since {
    font-size: 8px;
    color: var(--faint);
    letter-spacing: 0.08em;
  }
  .book-badge {
    position: absolute;
    top: 0.6rem;
    right: 0.6rem;
    font-size: 7px;
    letter-spacing: 0.15em;
    color: var(--warm);
    border: 1px solid var(--warm);
    padding: 2px 5px;
    text-transform: uppercase;
    opacity: 0.8;
  }

  .parallel-note {
    font-size: 8px;
    color: var(--mid);
    letter-spacing: 0.1em;
    text-align: center;
    padding: 0.6rem 0 0.2rem;
    border-top: 1px dashed var(--faint);
    margin-top: 0.4rem;
  }

  /* ── CALENDAR VIEW ── */
  .cal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.8rem;
  }
  .cal-month {
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    color: var(--ink);
  }
  .cal-nav {
    display: flex;
    gap: 0.5rem;
  }
  .cal-btn {
    background: transparent;
    border: 1px solid var(--faint);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--mid);
    padding: 3px 8px;
    cursor: pointer;
    letter-spacing: 0.1em;
  }
  .cal-btn:hover { border-color: var(--accent); color: var(--accent); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-bottom: 0.8rem;
  }
  .cal-day-header {
    font-size: 7px;
    letter-spacing: 0.1em;
    color: var(--faint);
    text-align: center;
    padding: 2px 0 4px;
    text-transform: uppercase;
  }
  .cal-cell {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: var(--mid);
    cursor: default;
    position: relative;
    border-radius: 2px;
  }
  .cal-cell.has-read {
    background: var(--accent);
    color: #fff;
    cursor: pointer;
  }
  .cal-cell.has-read:hover { opacity: 0.85; }
  .cal-cell.today {
    box-shadow: 0 0 0 1px var(--warm);
  }
  .cal-cell.empty { opacity: 0; pointer-events: none; }
  .cal-cell.other-month { color: var(--faint); }
  .dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: rgba(255,255,255,0.6);
    margin-top: 2px;
  }

  /* tooltip */
  .tooltip {
    position: fixed;
    background: var(--ink);
    color: #f5f0e8;
    font-size: 9px;
    padding: 4px 8px;
    letter-spacing: 0.08em;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 100;
    max-width: 180px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tooltip.show { opacity: 1; }

  .cal-legend {
    display: flex;
    gap: 1rem;
    font-size: 8px;
    color: var(--mid);
    letter-spacing: 0.08em;
    padding-top: 0.5rem;
    border-top: 1px solid var(--faint);
  }
  .legend-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--accent);
    margin-right: 4px;
    vertical-align: middle;
  }

  /* ── STATS VIEW ── */
  .year-label {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--ink);
    margin-bottom: 0.3rem;
  }
  .year-sub {
    font-size: 9px;
    color: var(--mid);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 1.2rem;
  }

  .stat-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
    margin-bottom: 1.2rem;
  }
  .stat-box {
    background: var(--paper);
    border: 1px solid var(--faint);
    padding: 0.8rem;
  }
  .stat-num {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 3px;
  }
  .stat-lbl {
    font-size: 8px;
    color: var(--mid);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .monthly-label {
    font-size: 9px;
    letter-spacing: 0.18em;
    color: var(--mid);
    text-transform: uppercase;
    margin-bottom: 0.6rem;
    margin-top: 0.6rem;
  }
  .bar-chart { display: flex; gap: 3px; align-items: flex-end; height: 60px; }
  .bar-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    height: 100%;
    justify-content: flex-end;
  }
  .bar {
    width: 100%;
    background: var(--accent);
    min-height: 2px;
    transition: height 0.4s ease;
  }
  .bar.zero { background: var(--faint); opacity: 0.5; }
  .bar-lbl {
    font-size: 7px;
    color: var(--faint);
    letter-spacing: 0.05em;
  }

  .finished-list { margin-top: 0.4rem; }
  .finished-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    border-bottom: 1px solid var(--faint);
    gap: 0.5rem;
  }
  .finished-item:last-child { border-bottom: none; }
  .f-title {
    font-family: 'DM Serif Display', serif;
    font-size: 12px;
    color: var(--ink);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .f-date {
    font-size: 8px;
    color: var(--faint);
    letter-spacing: 0.08em;
    flex-shrink: 0;
  }
  .f-check {
    font-size: 9px;
    color: var(--leaf);
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="tabs">
  <div class="tab active" data-view="now">NOW</div>
  <div class="tab" data-view="calendar">CALENDAR</div>
  <div class="tab" data-view="stats">STATS</div>
</div>

<!-- Currently Reading -->
<div id="view-now" class="view active">
  <div class="now-reading-title">지금 읽는 중</div>
  <div id="now-list"></div>
  <div class="parallel-note" id="parallel-note"></div>
</div>

<!-- Calendar -->
<div id="view-calendar" class="view">
  <div class="cal-header">
    <div class="cal-month" id="cal-month-label">2025 · 05</div>
    <div class="cal-nav">
      <button class="cal-btn" onclick="calNav(-1)">◀</button>
      <button class="cal-btn" onclick="calNav(1)">▶</button>
    </div>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div class="cal-legend">
    <span><span class="legend-dot"></span>독서 기록</span>
    <span id="cal-month-count"></span>
  </div>
</div>

<!-- Stats -->
<div id="view-stats" class="view">
  <div class="year-label" id="stats-year">2025</div>
  <div class="year-sub" id="stats-sub">연간 독서 현황</div>
  <div class="stat-row" id="stat-boxes"></div>
  <div class="monthly-label">월별 독서 기록</div>
  <div class="bar-chart" id="bar-chart"></div>
  <div class="monthly-label" style="margin-top:1.2rem;">완독 목록</div>
  <div class="finished-list" id="finished-list"></div>
</div>

<!-- tooltip -->
<div class="tooltip" id="tooltip"></div>

<script>
const DATA_PATH = '../../data/';
let readingList = [];
let quotesData  = [];
let calYear     = new Date().getFullYear();
let calMonth    = new Date().getMonth();

async function loadData() {
  try {
    const [rl, qd] = await Promise.all([
      fetch(DATA_PATH + 'reading-list.json').then(r => r.json()),
      fetch(DATA_PATH + 'quotes.json').then(r => r.json()),
    ]);
    readingList = rl;
    quotesData  = qd;
  } catch(e) {
    readingList = [];
    quotesData  = [];
  }
  renderAll();
}

function renderAll() {
  renderNow();
  renderCalendar();
  renderStats();
}

// ── NOW ──────────────────────────────────────────────────────────
function renderNow() {
  const now = readingList.filter(b => b.status === '읽는 중');
  const list = document.getElementById('now-list');
  list.innerHTML = '';
  if (!now.length) {
    list.innerHTML = '<div style="font-size:11px;color:var(--mid);text-align:center;padding:1.5rem 0;letter-spacing:0.1em;">현재 읽는 책이 없습니다</div>';
    return;
  }
  const colors = ['var(--accent)','var(--leaf)','var(--warm)','var(--mid)'];
  now.forEach((b, i) => {
    const card = document.createElement('div');
    card.className = 'book-card';
    const since = b.started ? ` · ${b.started.slice(5).replace('-','/')} 시작` : '';
    card.innerHTML = `
      <div class="book-spine" style="background:${colors[i % colors.length]}"></div>
      <div class="book-info">
        <div class="book-title">${b.title}</div>
        <div class="book-author">${b.author}</div>
        <div class="book-since">읽는 중${since}</div>
      </div>
      <div class="book-badge">reading</div>
    `;
    list.appendChild(card);
  });
  document.getElementById('parallel-note').textContent =
    now.length > 1 ? `📚 병렬 독서 중 · ${now.length}권` : '';
}

// ── CALENDAR ─────────────────────────────────────────────────────
function buildDateMap() {
  const map = {};
  quotesData.filter(q => q.type === 'book').forEach(q => {
    if (!q.captured) return;
    const d = q.captured.slice(0, 10);
    if (!map[d]) map[d] = [];
    map[d].push(q.source);
  });
  return map;
}

function renderCalendar() {
  const map       = buildDateMap();
  const months    = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const shortDays = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const today     = new Date();

  document.getElementById('cal-month-label').textContent =
    `${calYear} · ${String(calMonth+1).padStart(2,'0')}`;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  shortDays.forEach(d => {
    const h = document.createElement('div');
    h.className = 'cal-day-header';
    h.textContent = d;
    grid.appendChild(h);
  });

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();

  // empty cells
  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-cell empty';
    grid.appendChild(el);
  }

  let monthCount = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const books   = map[dateStr];
    const isToday = today.getFullYear()===calYear && today.getMonth()===calMonth && today.getDate()===d;

    const el = document.createElement('div');
    el.className = 'cal-cell' + (books ? ' has-read' : '') + (isToday ? ' today' : '');
    el.textContent = d;

    if (books) {
      monthCount++;
      const dot = document.createElement('div');
      dot.className = 'dot';
      el.appendChild(dot);
      el.addEventListener('mousemove', e => {
        const tip = document.getElementById('tooltip');
        const unique = [...new Set(books)].join(', ');
        tip.textContent = unique;
        tip.className = 'tooltip show';
        tip.style.left = (e.clientX + 8) + 'px';
        tip.style.top  = (e.clientY - 28) + 'px';
      });
      el.addEventListener('mouseleave', () => {
        document.getElementById('tooltip').className = 'tooltip';
      });
    }
    grid.appendChild(el);
  }

  document.getElementById('cal-month-count').textContent =
    monthCount > 0 ? `이달 ${monthCount}일 독서` : '기록 없음';
}

function calNav(dir) {
  calMonth += dir;
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0;  calYear++; }
  renderCalendar();
}

// ── STATS ─────────────────────────────────────────────────────────
function renderStats() {
  const year = new Date().getFullYear();
  document.getElementById('stats-year').textContent = year;

  const yearBooks = quotesData.filter(q => q.type === 'book' && q.captured && q.captured.startsWith(year+''));
  const uniqueTitles = [...new Set(yearBooks.map(q => q.source))];
  const finished = readingList.filter(b => b.status === '완독' && b.finished && b.finished.startsWith(year+''));

  // stat boxes
  const boxes = document.getElementById('stat-boxes');
  boxes.innerHTML = `
    <div class="stat-box">
      <div class="stat-num">${uniqueTitles.length}</div>
      <div class="stat-lbl">읽은 책</div>
    </div>
    <div class="stat-box">
      <div class="stat-num">${finished.length}</div>
      <div class="stat-lbl">완독</div>
    </div>
  `;

  // monthly bar chart
  const monthly = Array(12).fill(0);
  yearBooks.forEach(q => {
    const m = parseInt(q.captured.slice(5, 7)) - 1;
    if (!isNaN(m)) monthly[m]++;
  });
  const maxVal = Math.max(...monthly, 1);
  const months = ['J','F','M','A','M','J','J','A','S','O','N','D'];
  const chart = document.getElementById('bar-chart');
  chart.innerHTML = '';
  monthly.forEach((v, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'bar-wrap';
    const bar = document.createElement('div');
    bar.className = 'bar' + (v === 0 ? ' zero' : '');
    bar.style.height = `${Math.round((v / maxVal) * 100)}%`;
    const lbl = document.createElement('div');
    lbl.className = 'bar-lbl';
    lbl.textContent = months[i];
    wrap.appendChild(bar);
    wrap.appendChild(lbl);
    chart.appendChild(wrap);
  });

  // finished list
  const fl = document.getElementById('finished-list');
  fl.innerHTML = '';
  if (!finished.length) {
    fl.innerHTML = '<div style="font-size:10px;color:var(--mid);padding:0.5rem 0;">완독 기록 없음</div>';
    return;
  }
  finished.sort((a,b) => (b.finished||'').localeCompare(a.finished||'')).forEach(b => {
    const item = document.createElement('div');
    item.className = 'finished-item';
    item.innerHTML = `
      <span class="f-title">${b.title}</span>
      <span class="f-date">${(b.finished||'').slice(5).replace('-','/')}</span>
      <span class="f-check">✓</span>
    `;
    fl.appendChild(item);
  });
}

// ── TABS ──────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('view-' + tab.dataset.view).classList.add('active');
  });
});

loadData();
</script>
</body>
</html>
