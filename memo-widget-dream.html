<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memo OS · Itjae</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --text:#2C1850; --muted:#A080C0;
  --ac:#C850A0; --ac2:#5880D0;
  --ibd:rgba(200,160,220,.2);
  --card:rgba(255,248,254,0.96);
  --cbd:rgba(255,255,255,.82);
}
html,body{
  min-height:100%; background:transparent;
  display:flex; justify-content:center; align-items:flex-start;
  padding:16px; font-family:'Space Mono',monospace;
}
.widget{
  width:280px; background:var(--card);
  border:1px solid var(--cbd); border-radius:16px;
  display:flex; flex-direction:column;
  box-shadow:0 4px 24px rgba(200,100,160,.12);
  animation:float 6s ease-in-out infinite;
  overflow:hidden;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* header */
.hdr{
  padding:9px 13px; border-bottom:1px solid var(--ibd);
  display:flex; justify-content:space-between; align-items:center; flex-shrink:0;
}
.logo{font-size:8px;letter-spacing:.22em;color:var(--muted);font-weight:700}
.st{font-size:7px;color:var(--muted);letter-spacing:.1em}
.st.live{color:var(--ac)}

/* chat */
.chat{
  overflow-y:auto; padding:10px 12px;
  display:flex; flex-direction:column; gap:7px;
  min-height:160px; max-height:210px; flex-shrink:0;
}
.chat::-webkit-scrollbar{width:2px}
.chat::-webkit-scrollbar-thumb{background:rgba(200,160,220,.3);border-radius:1px}

.bubble{
  max-width:90%; align-self:flex-end;
  background:linear-gradient(135deg,rgba(200,80,160,.1),rgba(88,128,208,.08));
  border:1px solid rgba(200,160,220,.22);
  border-radius:12px 12px 2px 12px;
  padding:7px 10px;
}
.b-txt{
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:12px; color:var(--text); line-height:1.75;
  word-break:keep-all;
}
.b-meta{font-size:7px;color:var(--muted);margin-top:3px;text-align:right}
.b-tag{
  display:inline-block; font-size:6px; letter-spacing:.08em;
  background:rgba(200,80,160,.1); color:var(--ac);
  padding:1px 5px; border-radius:3px; margin-right:4px;
}

.empty{
  margin:auto; text-align:center;
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:12px; color:var(--muted); opacity:.55; line-height:1.9;
}

/* tags */
.tags{
  padding:7px 12px 4px; display:flex; gap:4px;
  flex-wrap:wrap; flex-shrink:0; border-top:1px solid var(--ibd);
}
.tb{
  font-size:7px; letter-spacing:.1em; padding:3px 7px;
  border-radius:10px; border:1px solid var(--ibd);
  background:transparent; color:var(--muted); cursor:pointer;
  transition:all .12s; font-family:'Space Mono',monospace;
}
.tb:hover{border-color:rgba(200,80,160,.3);color:var(--ac)}
.tb.on{background:rgba(200,80,160,.1);border-color:rgba(200,80,160,.3);color:var(--ac)}

/* input */
.inp-row{
  padding:6px 12px 10px; display:flex; gap:7px;
  align-items:flex-end; flex-shrink:0;
}
.minp{
  flex:1; background:rgba(255,255,255,.7);
  border:1px solid var(--ibd); border-radius:8px;
  padding:7px 9px; font-size:11.5px;
  font-family:'Cormorant Garamond',serif; font-style:italic;
  color:var(--text); outline:none; resize:none;
  min-height:34px; max-height:80px; line-height:1.55;
  transition:border-color .12s;
}
.minp::placeholder{color:rgba(160,128,192,.45)}
.minp:focus{border-color:rgba(200,80,160,.3)}
.sbtn{
  background:linear-gradient(135deg,rgba(200,80,160,.88),rgba(88,128,208,.82));
  border:none; border-radius:8px; padding:0 12px;
  font-size:8px; font-family:'Space Mono',monospace;
  color:#fff; cursor:pointer; letter-spacing:.06em;
  transition:opacity .12s; flex-shrink:0; height:34px;
}
.sbtn:hover{opacity:.85}
.sbtn:active{opacity:.7;transform:scale(.97)}
.sbtn:disabled{opacity:.38;cursor:default}
</style>
</head>
<body>
<div class="widget">

  <div class="hdr">
    <span class="logo">MEMO OS</span>
    <span class="st" id="st">LOCAL</span>
  </div>

  <div class="chat" id="chat">
    <div class="empty" id="empty">아직 메모가 없어요.<br>첫 기록을 남겨보세요.</div>
  </div>

  <div class="tags">
    <button class="tb on" data-tag="MEMO"  onclick="setTag(this)">MEMO</button>
    <button class="tb"    data-tag="IDEA"  onclick="setTag(this)">IDEA</button>
    <button class="tb"    data-tag="TODO"  onclick="setTag(this)">TODO</button>
    <button class="tb"    data-tag="QUOTE" onclick="setTag(this)">QUOTE</button>
    <button class="tb"    data-tag="WORK"  onclick="setTag(this)">WORK</button>
  </div>

  <div class="inp-row">
    <textarea class="minp" id="minp" placeholder="메모를 적어주세요..." rows="1"
      oninput="resize(this)"></textarea>
    <button class="sbtn" id="sbtn" onclick="send()">SEND</button>
  </div>

</div>

<script>
/* ─── CONFIG ────────────────────────────────────────────
   Worker URL 입력하면 Notion DB 실시간 연동 시작
   비워두면 로컬스토리지에만 저장
──────────────────────────────────────────────────────── */
const WORKER_URL = '';

let memos   = JSON.parse(localStorage.getItem('mo_memos') || '[]');
let curTag  = 'MEMO';
let sending = false;

init();

function init() {
  render();
  if (WORKER_URL) pull();
}

/* ─── Tag ─── */
function setTag(el) {
  document.querySelectorAll('.tb').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  curTag = el.dataset.tag;
}

/* ─── Textarea resize ─── */
function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 80) + 'px';
}

/* ─── Send ─── */
async function send() {
  const inp = document.getElementById('minp');
  const txt = inp.value.trim();
  if (!txt || sending) return;

  sending = true;
  document.getElementById('sbtn').disabled = true;

  const memo = {
    id:   Date.now(),
    text: txt,
    tag:  curTag,
    time: new Date().toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' }),
    date: new Date().toLocaleDateString('ko-KR', { month:'short', day:'numeric' }),
  };

  memos.push(memo);
  save();
  inp.value = '';
  inp.style.height = 'auto';
  render();
  bottom();

  if (WORKER_URL) {
    try {
      await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: memo.text, tag: memo.tag }),
      });
    } catch (e) { console.warn('전송 실패:', e.message); }
  }

  sending = false;
  document.getElementById('sbtn').disabled = false;
}

/* ─── Pull from Worker ─── */
async function pull() {
  try {
    const r = await fetch(WORKER_URL);
    const d = await r.json();
    if (Array.isArray(d.memos) && d.memos.length) {
      memos = d.memos.reverse();
      save();
      document.getElementById('st').textContent = 'LIVE';
      document.getElementById('st').classList.add('live');
      render();
    }
  } catch (e) { console.warn('불러오기 실패:', e.message); }
}

/* ─── Render ─── */
function render() {
  const el = document.getElementById('chat');
  if (!memos.length) {
    el.innerHTML = '<div class="empty">아직 메모가 없어요.<br>첫 기록을 남겨보세요.</div>';
    return;
  }
  el.innerHTML = memos.slice(-40).map(m => `
    <div class="bubble">
      <div class="b-txt">${esc(m.text)}</div>
      <div class="b-meta"><span class="b-tag">${m.tag||'MEMO'}</span>${m.date||''} ${m.time||''}</div>
    </div>`).join('');
  bottom();
}

function bottom() {
  const el = document.getElementById('chat');
  requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; });
}

function save() { localStorage.setItem('mo_memos', JSON.stringify(memos.slice(-100))); }
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

document.getElementById('minp').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
</script>
</body>
</html>
