<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receipt Log</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    display: flex;
    justify-content: center;
    padding: 1.5rem 1rem 3rem;
    min-height: 100vh;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
  }

  .receipt {
    width: 100%;
    max-width: 320px;
    background: #f5f0e8;
    position: relative;
    /* torn top edge */
    clip-path: polygon(
      0% 0%, 2% 1%, 4% 0%, 6% 1.5%, 8% 0.5%, 10% 1%, 12% 0%,
      14% 1.5%, 16% 0.3%, 18% 1%, 20% 0%, 22% 1.2%, 24% 0.4%,
      26% 1%, 28% 0%, 30% 1.5%, 32% 0.5%, 34% 1%, 36% 0%,
      38% 1.3%, 40% 0.2%, 42% 1%, 44% 0%, 46% 1.5%, 48% 0.4%,
      50% 1%, 52% 0%, 54% 1.2%, 56% 0.6%, 58% 1%, 60% 0%,
      62% 1.4%, 64% 0.3%, 66% 1%, 68% 0%, 70% 1.5%, 72% 0.5%,
      74% 1%, 76% 0%, 78% 1.3%, 80% 0.4%, 82% 1%, 84% 0%,
      86% 1.5%, 88% 0.3%, 90% 1%, 92% 0%, 94% 1.4%, 96% 0.5%,
      98% 1%, 100% 0%, 100% 100%, 0% 100%
    );
    padding: 1.5rem 1.2rem 1rem;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));
  }

  .receipt::after {
    content: '';
    display: block;
    height: 28px;
    background:
      repeating-linear-gradient(
        90deg,
        transparent 0px, transparent 9px,
        #f5f0e8 9px, #f5f0e8 11px
      );
    clip-path: polygon(
      0% 0%,
      5% 100%, 10% 0%, 15% 100%, 20% 0%, 25% 100%, 30% 0%,
      35% 100%, 40% 0%, 45% 100%, 50% 0%, 55% 100%, 60% 0%,
      65% 100%, 70% 0%, 75% 100%, 80% 0%, 85% 100%, 90% 0%,
      95% 100%, 100% 0%, 100% 0%, 0% 0%
    );
    margin: 0 -1.2rem;
  }

  .store-name {
    text-align: center;
    font-size: 15px;
    letter-spacing: 0.3em;
    color: #1a1a18;
    margin-bottom: 0.3rem;
    text-transform: uppercase;
  }
  .store-sub {
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: #888880;
    margin-bottom: 1rem;
  }
  .divider {
    border: none;
    border-top: 1px dashed #bbb8b0;
    margin: 0.7rem 0;
  }
  .row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #555550;
    margin-bottom: 0.2rem;
    letter-spacing: 0.05em;
  }
  .row.header {
    font-size: 10px;
    color: #888880;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .section-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    color: #aaa8a0;
    text-transform: uppercase;
    margin: 0.8rem 0 0.4rem;
  }

  /* tasks */
  .task-list { margin: 0.2rem 0; }
  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 3px 0;
    cursor: pointer;
    user-select: none;
  }
  .task-item input[type="checkbox"] {
    appearance: none;
    width: 12px;
    height: 12px;
    border: 1px solid #888880;
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 1px;
    position: relative;
  }
  .task-item input[type="checkbox"]:checked::after {
    content: 'X';
    position: absolute;
    top: -2px;
    left: 1px;
    font-size: 10px;
    color: #1a1a18;
    font-family: 'Share Tech Mono', monospace;
  }
  .task-label {
    font-size: 12px;
    color: #333330;
    flex: 1;
    line-height: 1.4;
    letter-spacing: 0.03em;
  }
  .task-label.done {
    text-decoration: line-through;
    color: #aaa8a0;
  }

  /* add item */
  .add-row {
    display: flex;
    gap: 6px;
    margin-top: 0.5rem;
    align-items: center;
  }
  .add-row input[type="text"] {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px dashed #bbb8b0;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: #333330;
    padding: 2px 0;
    outline: none;
    letter-spacing: 0.03em;
  }
  .add-row input::placeholder { color: #ccc8c0; }
  .add-btn {
    background: transparent;
    border: none;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #888880;
    cursor: pointer;
    letter-spacing: 0.1em;
    padding: 2px 4px;
  }
  .add-btn:hover { color: #333330; }

  .total-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #1a1a18;
    font-weight: 700;
    letter-spacing: 0.08em;
    margin-top: 0.3rem;
  }
  .note-area {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px dashed #bbb8b0;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: #333330;
    resize: none;
    outline: none;
    letter-spacing: 0.03em;
    line-height: 1.5;
    min-height: 40px;
    margin-top: 0.2rem;
  }
  .note-area::placeholder { color: #ccc8c0; }
  .barcode {
    text-align: center;
    margin-top: 0.8rem;
    font-size: 9px;
    color: #bbb8b0;
    letter-spacing: 0.1em;
  }
  .barcode-lines {
    display: flex;
    justify-content: center;
    gap: 1px;
    margin: 4px 0;
  }
  .barcode-lines span {
    display: inline-block;
    height: 24px;
    background: #555550;
  }
</style>
</head>
<body>

<div class="receipt">
  <div class="store-name">DAILY LOG</div>
  <div class="store-sub" id="date-sub">---- / -- / --</div>

  <hr class="divider">
  <div class="row header">
    <span>ITEM</span><span>DONE</span>
  </div>

  <div class="section-label">할 일</div>
  <div class="task-list" id="task-list"></div>
  <div class="add-row">
    <input type="text" id="new-task" placeholder="+ add item..." maxlength="40">
    <button class="add-btn" onclick="addTask()">ADD</button>
  </div>

  <hr class="divider">

  <div class="section-label">메모</div>
  <textarea class="note-area" id="note" placeholder="today's note..." rows="3"></textarea>

  <hr class="divider">

  <div class="total-row">
    <span>TOTAL</span>
    <span id="total-display">0 / 0</span>
  </div>
  <div class="row" style="margin-top:4px;">
    <span style="font-size:10px;color:#aaa8a0;">COMPLETION</span>
    <span style="font-size:10px;color:#aaa8a0;" id="pct">---%</span>
  </div>

  <div class="barcode">
    <div class="barcode-lines" id="barcode"></div>
    <div id="barcode-num">0000 0000 0000</div>
  </div>
</div>

<script>
  const KEY_TASKS = 'receipt_tasks_';
  const KEY_NOTE  = 'receipt_note_';

  function todayKey() {
    const d = new Date();
    return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  }

  function load() {
    const k = todayKey();
    return {
      tasks: JSON.parse(localStorage.getItem(KEY_TASKS + k) || '[]'),
      note:  localStorage.getItem(KEY_NOTE + k) || ''
    };
  }

  function save(tasks, note) {
    const k = todayKey();
    localStorage.setItem(KEY_TASKS + k, JSON.stringify(tasks));
    localStorage.setItem(KEY_NOTE + k, note);
  }

  let state = load();

  function render() {
    const list = document.getElementById('task-list');
    list.innerHTML = '';
    state.tasks.forEach((t, i) => {
      const row = document.createElement('div');
      row.className = 'task-item';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = t.done;
      cb.onchange = () => { state.tasks[i].done = cb.checked; save(state.tasks, state.note); render(); };
      const lbl = document.createElement('span');
      lbl.className = 'task-label' + (t.done ? ' done' : '');
      lbl.textContent = t.text;
      row.appendChild(cb);
      row.appendChild(lbl);
      list.appendChild(row);
    });
    const done = state.tasks.filter(t => t.done).length;
    const total = state.tasks.length;
    document.getElementById('total-display').textContent = `${done} / ${total}`;
    document.getElementById('pct').textContent = total ? `${Math.round(done/total*100)}%` : '---%';
    document.getElementById('note').value = state.note;
  }

  function addTask() {
    const inp = document.getElementById('new-task');
    const text = inp.value.trim();
    if (!text) return;
    state.tasks.push({ text, done: false });
    save(state.tasks, state.note);
    inp.value = '';
    render();
  }

  document.getElementById('new-task').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  document.getElementById('note').addEventListener('input', e => {
    state.note = e.target.value;
    save(state.tasks, state.note);
  });

  // date
  const now = new Date();
  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  document.getElementById('date-sub').textContent =
    `${now.getFullYear()} / ${String(now.getMonth()+1).padStart(2,'0')} / ${String(now.getDate()).padStart(2,'0')} · ${days[now.getDay()]}`;

  // barcode
  const bc = document.getElementById('barcode');
  let bstr = '';
  for (let i = 0; i < 36; i++) {
    const w = [1,1,2,1,3,1,2][Math.floor(Math.random()*7)];
    const gap = i % 4 === 0 ? 3 : 1;
    const sp = document.createElement('span');
    sp.style.width = w + 'px';
    if (i % 5 === 0) sp.style.height = '30px';
    bc.appendChild(sp);
    const g = document.createElement('span');
    g.style.width = gap + 'px';
    g.style.background = 'transparent';
    bc.appendChild(g);
  }
  document.getElementById('barcode-num').textContent =
    `${String(now.getFullYear()).padStart(4,'0')} ${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')} ${String(Math.floor(Math.random()*9999)).padStart(4,'0')}`;

  render();
</script>
</body>
</html>
