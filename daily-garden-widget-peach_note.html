<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Garden Check-in Widget - peach_note</title>
  <style>
    :root {
      --paper: #fffaf6;
      --paper-2: #fff2e9;
      --pink: #f7d9d0;
      --pink-strong: #e7a098;
      --blue: #e9f0ef;
      --green: #e7ead7;
      --yellow: #f8e4aa;
      --line: #5d4f49;
      --muted: #8e8179;
      --soft-line: rgba(93, 79, 73, 0.20);
      --shadow: rgba(93, 79, 73, 0.08);
      --selected: #fff0dd;
      --selected-line: #d9a56e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f7f3ea;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
        "Noto Sans KR", "Segoe UI", sans-serif;
      color: var(--line);
    }

    .widget-shell {
      width: min(390px, 100vw);
      padding: 14px;
    }

    .widget {
      position: relative;
      overflow: hidden;
      width: 100%;
      min-height: 640px;
      padding: 30px 24px 26px;
      border: 1.5px solid rgba(79, 86, 81, 0.62);
      border-radius: 26px;
      background: var(--paper);
      box-shadow: 0 18px 40px var(--shadow);
    }

    .doodle-border {
      pointer-events: none;
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(79, 86, 81, 0.2);
      border-radius: 22px;
    }

    .corner {
      display: none;
    }

    .corner svg {
      display: block;
      width: 118px;
      height: auto;
    }

    .corner-top-left,
    .corner-top-right {
      display: none;
    }

    .content {
      position: relative;
      z-index: 2;
    }

    .title-area {
      padding-top: 10px;
      margin-bottom: 24px;
      text-align: center;
    }

    .eyebrow {
      margin-bottom: 8px;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .title {
      margin: 0;
      font-family: "DM Sans", Inter, Pretendard, sans-serif;
      font-size: 30px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: #49654f;
    }

    .date {
      margin-top: 8px;
      font-size: 13px;
      letter-spacing: 0.18em;
      color: #696b62;
    }

    .section {
      padding: 15px 0 16px;
      border-top: 1px dashed var(--soft-line);
    }

    .section:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .section-title {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 8px;
    }

    .num {
      font-size: 15px;
      color: #d9868d;
      letter-spacing: 0.08em;
    }

    .label {
      font-family: "DM Sans", Inter, Pretendard, sans-serif;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    .helper {
      margin: 0 0 10px;
      font-size: 11px;
      color: var(--muted);
    }

    input,
    textarea,
    button {
      font: inherit;
    }

    .one-thing {
      width: 100%;
      height: 42px;
      padding: 0 12px;
      border: 1px solid rgba(79, 86, 81, 0.24);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--line);
      outline: none;
    }

    .one-thing:focus,
    textarea:focus {
      border-color: rgba(216, 185, 106, 0.85);
      box-shadow: 0 0 0 3px rgba(247, 235, 168, 0.35);
    }

    .done-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      font-size: 12px;
      color: #5d625a;
    }

    .done-row input {
      width: 16px;
      height: 16px;
      accent-color: #d8b96a;
    }

    .choice-grid {
      display: grid;
      gap: 8px;
    }

    .choice-grid.mood {
      grid-template-columns: repeat(5, 1fr);
    }

    .choice-grid.weather {
      grid-template-columns: repeat(4, 1fr);
    }

    .choice-grid.sleep {
      grid-template-columns: repeat(3, 1fr);
    }

    .choice {
      min-height: 58px;
      padding: 7px 5px;
      border: 1px solid rgba(79, 86, 81, 0.18);
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.64);
      color: var(--line);
      cursor: pointer;
      transition: transform 0.14s ease, background 0.14s ease, border-color 0.14s ease;
    }

    .choice:hover {
      transform: translateY(-1px);
      border-color: rgba(79, 86, 81, 0.34);
    }

    .choice.selected {
      background: var(--selected);
      border-color: var(--selected-line);
    }

    .icon {
      display: block;
      margin: 0 auto 5px;
      width: 24px;
      height: 24px;
    }

    .choice span {
      display: block;
      font-size: 11px;
      line-height: 1.25;
      white-space: nowrap;
    }

    textarea {
      width: 100%;
      min-height: 54px;
      resize: none;
      padding: 11px 12px;
      border: 1px solid rgba(79, 86, 81, 0.24);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--line);
      outline: none;
    }

    .action-area {
      position: relative;
      z-index: 4;
      margin-top: 2px;
      padding: 8px 0 2px;
      border-radius: 14px;
    }

    .save {
      width: 100%;
      margin-top: 0;
      height: 46px;
      border: 1px solid rgba(216, 151, 158, 0.65);
      border-radius: 9px;
      background: rgba(248, 221, 226, 0.62);
      color: #4f5651;
      cursor: pointer;
      font-family: "DM Sans", Inter, Pretendard, sans-serif;
      font-size: 17px;
      letter-spacing: 0.06em;
      transition: transform 0.14s ease, background 0.14s ease;
    }

    .save:hover {
      transform: translateY(-1px);
      background: rgba(248, 221, 226, 0.86);
    }

    .status {
      min-height: 18px;
      margin-top: 9px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
    }

    .footer-line {
      display: none;
    }

    @media (max-width: 360px) {
      .widget-shell { padding: 8px; }
      .widget { padding: 24px 18px 20px; }
      .choice-grid.mood { grid-template-columns: repeat(3, 1fr); }
      .choice-grid.weather { grid-template-columns: repeat(3, 1fr); }
      .choice-grid.sleep { grid-template-columns: repeat(2, 1fr); }
      .title { font-size: 27px; }
    }
  </style>
</head>
<body>
  <main class="widget-shell">
    <section class="widget" aria-label="Daily Garden Check-in">
      <div class="doodle-border"></div>

      <div class="content">
        <header class="title-area">
          <div class="eyebrow">Notion widget</div>
          <h1 class="title">Daily Garden</h1>
          <div class="date" id="dateText">2026.06.06 Sat</div>
        </header>

        <section class="section">
          <div class="section-title"><span class="num">01</span><span class="label">Today’s One Thing</span></div>
          <p class="helper">오늘 가장 중요한 일 하나만 정해보세요.</p>
          <input class="one-thing" id="oneThing" type="text" placeholder="예: 상세페이지 섹션 1차 정리하기" />
          <label class="done-row">
            <input type="checkbox" id="done" />
            <span>오늘 이것만 끝내면 충분해요!</span>
          </label>
        </section>

        <section class="section">
          <div class="section-title"><span class="num">02</span><span class="label">Mood</span></div>
          <p class="helper">오늘의 기분은 어때요?</p>
          <div class="choice-grid mood" data-group="mood">
            <button class="choice" data-value="가벼움" type="button"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5.5" fill="#F7EBA8" stroke="#4f5651"/><path d="M12 1.8v3M12 19.2v3M1.8 12h3M19.2 12h3M4.8 4.8l2 2M17.2 17.2l2 2M19.2 4.8l-2 2M6.8 17.2l-2 2" stroke="#4f5651" stroke-linecap="round"/></svg><span>가벼움</span></button>
            <button class="choice" data-value="평온함" type="button"><svg class="icon" viewBox="0 0 24 24"><path d="M5 16c5-1 9-5 11-11 4 7 0 13-6 14-3 .5-5-.5-5-3Z" fill="#DDE8D2" stroke="#4f5651"/><path d="M4 20c5-4 8-6 14-7" stroke="#4f5651" stroke-linecap="round"/></svg><span>평온함</span></button>
            <button class="choice" data-value="흐림" type="button"><svg class="icon" viewBox="0 0 24 24"><path d="M7 16.5h10a4 4 0 0 0 .2-8 5.7 5.7 0 0 0-10.8 1.8A3.2 3.2 0 0 0 7 16.5Z" fill="#DCEBF0" stroke="#4f5651"/></svg><span>흐림</span></button>
            <button class="choice" data-value="지침" type="button"><svg class="icon" viewBox="0 0 24 24"><path d="M6.5 14h11a3.8 3.8 0 0 0 0-7.6 5.4 5.4 0 0 0-10.2 1.7A3 3 0 0 0 6.5 14Z" fill="#DCEBF0" stroke="#4f5651"/><path d="M9 17.5v2M14 17.5v2" stroke="#4f5651" stroke-linecap="round"/></svg><span>지침</span></button>
            <button class="choice" data-value="설렘" type="button"><svg class="icon" viewBox="0 0 24 24"><path d="M12 3l1.7 5.3L19 10l-5.3 1.7L12 17l-1.7-5.3L5 10l5.3-1.7L12 3Z" fill="#F7EBA8" stroke="#4f5651"/><path d="M19.5 15l.8 2.3 2.2.7-2.2.8-.8 2.2-.7-2.2-2.3-.8 2.3-.7.7-2.3Z" fill="#F8DDE2" stroke="#4f5651"/></svg><span>설렘</span></button>
          </div>
        </section>

        <section class="section">
          <div class="section-title"><span class="num">03</span><span class="label">Weather</span></div>
          <p class="helper">오늘의 날씨를 기록해요.</p>
          <div class="choice-grid weather" data-group="weather">
            <button class="choice" data-value="맑음" type="button"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" fill="#F7EBA8" stroke="#4f5651"/><path d="M12 2.2v2M12 19.8v2M2.2 12h2M19.8 12h2M5 5l1.4 1.4M17.6 17.6 19 19M19 5l-1.4 1.4M6.4 17.6 5 19" stroke="#4f5651" stroke-linecap="round"/></svg><span>맑음</span></button>
            <button class="choice" data-value="구름" type="button"><svg class="icon" viewBox="0 0 24 24"><path d="M6.5 16.5h11a4 4 0 0 0 0-8 5.5 5.5 0 0 0-10.4 1.7 3.2 3.2 0 0 0-.6 6.3Z" fill="#DCEBF0" stroke="#4f5651"/></svg><span>구름</span></button>
            <button class="choice" data-value="비" type="button"><svg class="icon" viewBox="0 0 24 24"><path d="M7 10c1-5 8-6 11-2 3 0 5 2 5 5" stroke="#4f5651" fill="none" stroke-linecap="round"/><path d="M12 4v16M8 12c5 4 9 4 13 0" stroke="#4f5651" fill="none" stroke-linecap="round"/><path d="M10 20c-.8-1-.8-1.9 0-3M15 20c-.8-1-.8-1.9 0-3" stroke="#4f5651" stroke-linecap="round"/></svg><span>비</span></button>
            <button class="choice" data-value="바람" type="button"><svg class="icon" viewBox="0 0 24 24"><path d="M3 8h12c3 0 3-4 0-4-1.3 0-2.2.7-2.5 1.8M5 13h14c3 0 3 4 0 4-1.4 0-2.4-.8-2.7-2M2 18h9" stroke="#4f5651" fill="none" stroke-linecap="round"/></svg><span>바람</span></button>
            <button class="choice" data-value="더움" type="button"><svg class="icon" viewBox="0 0 24 24"><path d="M12 3v11" stroke="#4f5651" stroke-linecap="round"/><path d="M9 14.8a5 5 0 1 0 6 0V5a3 3 0 0 0-6 0v9.8Z" fill="#F8DDE2" stroke="#4f5651"/><path d="M12 8v9" stroke="#F4A7B2" stroke-width="2" stroke-linecap="round"/></svg><span>더움</span></button>
            <button class="choice" data-value="추움" type="button"><svg class="icon" viewBox="0 0 24 24"><path d="M12 3v18M5 7l14 10M19 7 5 17M7 3l5 4 5-4M7 21l5-4 5 4" stroke="#4f5651" fill="none" stroke-linecap="round"/></svg><span>추움</span></button>
            <button class="choice" data-value="눈" type="button"><svg class="icon" viewBox="0 0 24 24"><path d="M8 12.5h8a3.5 3.5 0 0 0 .1-7 5 5 0 0 0-9.5 1.6A2.8 2.8 0 0 0 8 12.5Z" fill="#fff" stroke="#4f5651"/><circle cx="9" cy="17" r="1" fill="#4f5651"/><circle cx="14" cy="19" r="1" fill="#4f5651"/></svg><span>눈</span></button>
            <button class="choice" data-value="안개" type="button"><svg class="icon" viewBox="0 0 24 24"><path d="M4 9h16M6 13h12M3 17h14M19 17h2" stroke="#4f5651" fill="none" stroke-linecap="round"/></svg><span>안개</span></button>
          </div>
        </section>

        <section class="section">
          <div class="section-title"><span class="num">04</span><span class="label">Sleep Condition</span></div>
          <p class="helper">어제 잠은 어땠나요?</p>
          <div class="choice-grid sleep" data-group="sleep">
            <button class="choice" data-value="아주 잘 잠" type="button"><svg class="icon" viewBox="0 0 24 24"><path d="M16 3c-5 1-8 5-8 10 0 4 2.7 7 6.8 7A9 9 0 0 1 16 3Z" fill="#F7EBA8" stroke="#4f5651"/><path d="M18 5l.6 1.8 1.8.6-1.8.6-.6 1.8-.6-1.8-1.8-.6 1.8-.6.6-1.8Z" fill="#fff" stroke="#4f5651"/></svg><span>아주 잘 잠</span></button>
            <button class="choice" data-value="보통" type="button"><svg class="icon" viewBox="0 0 24 24"><path d="M7 16.5h10a4 4 0 0 0 0-8 5.5 5.5 0 0 0-10.4 1.7 3.2 3.2 0 0 0 .4 6.3Z" fill="#DCEBF0" stroke="#4f5651"/><path d="M17 6c2.5 1.3 4 3.8 4 6.5 0 2.8-1.6 5.3-4 6.5" stroke="#F7EBA8" stroke-width="1.7" stroke-linecap="round"/></svg><span>보통</span></button>
            <button class="choice" data-value="자주 깸" type="button"><svg class="icon" viewBox="0 0 24 24"><path d="M5 15.5h14" stroke="#4f5651" stroke-linecap="round"/><path d="M7 15.5V10a3 3 0 0 1 3-3h4a3 3 0 0 1 3 3v5.5" fill="#fff" stroke="#4f5651"/><path d="M9 6l-1-2M15 6l1-2" stroke="#4f5651" stroke-linecap="round"/></svg><span>자주 깸</span></button>
            <button class="choice" data-value="수면 부족" type="button"><svg class="icon" viewBox="0 0 24 24"><path d="M7 16c-2-6 2-11 5-11s7 5 5 11" fill="#F8DDE2" stroke="#4f5651"/><circle cx="9.2" cy="11" r="1" fill="#4f5651"/><circle cx="14.8" cy="11" r="1" fill="#4f5651"/><path d="M10 15c1.5-1 2.5-1 4 0" stroke="#4f5651" stroke-linecap="round"/></svg><span>수면 부족</span></button>
            <button class="choice" data-value="너무 피곤" type="button"><svg class="icon" viewBox="0 0 24 24"><path d="M7 17c-1.5-7 2.5-12 5-12s6.5 5 5 12" fill="#fff" stroke="#4f5651"/><path d="M9 11l2 1.5M15 11l-2 1.5M10 16h4" stroke="#4f5651" stroke-linecap="round"/></svg><span>너무 피곤</span></button>
            <button class="choice" data-value="기억 안 남" type="button"><svg class="icon" viewBox="0 0 24 24"><path d="M12 16v-.5c0-2.4 3-2.8 3-5.5 0-1.8-1.3-3-3.2-3-1.8 0-3 .9-3.8 2.2" stroke="#4f5651" fill="none" stroke-linecap="round"/><circle cx="12" cy="20" r="1" fill="#4f5651"/></svg><span>기억 안 남</span></button>
          </div>
        </section>

        <section class="section">
          <div class="section-title"><span class="num">05</span><span class="label">Note</span></div>
          <p class="helper">짧은 한마디를 남겨보세요.</p>
          <textarea id="note" placeholder="예: 오늘은 천천히, 집중해서 ✦"></textarea>
        </section>

        <div class="action-area">
          <button class="save" id="saveBtn" type="button">Save today</button>
          <div class="status" id="status">저장하면 Notion DB로 보낼 수 있는 구조입니다.</div>
          
        </div>
      </div>
    </section>
  </main>

  <script>
    const state = {
      mood: "",
      weather: "",
      sleep: ""
    };

    const dateText = document.getElementById("dateText");
    const now = new Date();
    const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
    const yyyy = now.getFullYear();
    const mm = String(now.getMonth() + 1).padStart(2, "0");
    const dd = String(now.getDate()).padStart(2, "0");
    dateText.textContent = `${yyyy}.${mm}.${dd} ${days[now.getDay()]}`;

    document.querySelectorAll("[data-group]").forEach(group => {
      group.addEventListener("click", event => {
        const button = event.target.closest(".choice");
        if (!button) return;

        const key = group.dataset.group;
        state[key] = button.dataset.value;

        group.querySelectorAll(".choice").forEach(item => {
          item.classList.remove("selected");
          item.setAttribute("aria-pressed", "false");
        });

        button.classList.add("selected");
        button.setAttribute("aria-pressed", "true");
      });
    });

    document.getElementById("saveBtn").addEventListener("click", async () => {
      const payload = {
        date: `${yyyy}-${mm}-${dd}`,
        oneThing: document.getElementById("oneThing").value.trim(),
        done: document.getElementById("done").checked,
        mood: state.mood,
        weather: state.weather,
        sleepCondition: state.sleep,
        note: document.getElementById("note").value.trim()
      };

      const status = document.getElementById("status");

      if (!payload.oneThing) {
        status.textContent = "오늘의 가장 중요한 일을 먼저 적어주세요.";
        return;
      }

      localStorage.setItem("daily-garden-demo", JSON.stringify(payload));
      status.textContent = "데모 저장 완료. API 연결 시 Notion DB에 저장됩니다.";

      /*
        실제 Notion DB 연동 시 예시:
        await fetch("/api/checkin", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
      */
    });

    const saved = localStorage.getItem("daily-garden-demo");
    if (saved) {
      try {
        const data = JSON.parse(saved);
        if (data.date === `${yyyy}-${mm}-${dd}`) {
          document.getElementById("oneThing").value = data.oneThing || "";
          document.getElementById("done").checked = !!data.done;
          document.getElementById("note").value = data.note || "";
          ["mood", "weather", "sleep"].forEach(key => {
            if (!data[key] && key !== "sleep") return;
            const value = key === "sleep" ? data.sleepCondition : data[key];
            if (!value) return;
            state[key] = value;
            const group = document.querySelector(`[data-group="${key}"]`);
            const button = group?.querySelector(`[data-value="${value}"]`);
            button?.classList.add("selected");
          });
        }
      } catch (error) {}
    }
  </script>
</body>
</html>
