<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoftPod Music Widget</title>
  <style>
    :root {
      --paper: #fffdf8;
      --cream: #fff8ef;
      --pink: #f8dde2;
      --blue: #dcebf0;
      --yellow: #f7eba8;
      --line: #4f5651;
      --muted: #85877d;
      --soft-line: rgba(79, 86, 81, 0.2);
      --shadow: rgba(79, 86, 81, 0.1);
      --screen: #f7fbf7;
      --selected: #fff0c9;
      --selected-line: #d8b96a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f7f3ea;
      color: var(--line);
      font-family: "SF Mono", "IBM Plex Mono", "Roboto Mono", "Space Mono",
        ui-monospace, Menlo, Consolas, monospace;
    }

    .shell {
      width: min(340px, 100vw);
      padding: 14px;
    }

    .pod {
      position: relative;
      width: 100%;
      padding: 18px 18px 20px;
      border: 1.5px solid rgba(79, 86, 81, 0.62);
      border-radius: 34px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.72), transparent 46%),
        var(--paper);
      box-shadow: 0 18px 44px var(--shadow);
      overflow: hidden;
    }

    .pod::before {
      content: "";
      position: absolute;
      inset: 9px;
      border: 1px solid rgba(79, 86, 81, 0.14);
      border-radius: 27px;
      pointer-events: none;
    }

    .topbar {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding: 0 4px;
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .add-toggle {
      width: 24px;
      height: 24px;
      border: 1px solid rgba(79, 86, 81, 0.18);
      border-radius: 999px;
      background: rgba(255,255,255,0.55);
      color: var(--line);
      cursor: pointer;
      font-family: inherit;
      font-size: 15px;
      line-height: 1;
    }

    .add-panel {
      position: relative;
      z-index: 2;
      display: none;
      grid-template-columns: 1fr 42px;
      gap: 6px;
      margin-bottom: 10px;
    }

    .add-panel.open { display: grid; }

    input {
      width: 100%;
      height: 30px;
      padding: 0 9px;
      border: 1px solid rgba(79, 86, 81, 0.22);
      border-radius: 8px;
      background: rgba(255,255,255,0.7);
      color: var(--line);
      outline: none;
      font: inherit;
      font-size: 10px;
    }

    input:focus {
      border-color: rgba(216, 185, 106, 0.85);
      box-shadow: 0 0 0 3px rgba(247, 235, 168, 0.28);
    }

    .add-btn {
      border: 1px solid rgba(216, 151, 158, 0.62);
      border-radius: 8px;
      background: rgba(248, 221, 226, 0.68);
      color: var(--line);
      cursor: pointer;
      font: inherit;
      font-size: 10px;
    }

    .screen {
      position: relative;
      z-index: 1;
      overflow: hidden;
      min-height: 225px;
      padding: 12px;
      border: 1.5px solid rgba(79, 86, 81, 0.36);
      border-radius: 18px;
      background: var(--screen);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.65);
    }

    .screen-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 9px;
      padding-bottom: 7px;
      border-bottom: 1px solid rgba(79, 86, 81, 0.13);
      font-size: 9px;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .battery {
      width: 24px;
      height: 10px;
      border: 1px solid rgba(79,86,81,0.42);
      border-radius: 2px;
      padding: 1px;
      position: relative;
    }

    .battery::after {
      content: "";
      position: absolute;
      right: -4px;
      top: 2px;
      width: 2px;
      height: 4px;
      background: rgba(79,86,81,0.42);
      border-radius: 0 1px 1px 0;
    }

    .battery span {
      display: block;
      height: 100%;
      width: 68%;
      background: var(--yellow);
      border-radius: 1px;
    }

    .art-row {
      display: grid;
      grid-template-columns: 82px 1fr;
      gap: 11px;
      align-items: center;
      margin-bottom: 11px;
    }

    .album {
      width: 82px;
      height: 82px;
      border: 1px solid rgba(79, 86, 81, 0.18);
      border-radius: 11px;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(248,221,226,0.56), transparent 45%),
        linear-gradient(315deg, rgba(220,235,240,0.64), transparent 50%),
        var(--cream);
    }

    .album img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      filter: saturate(0.9);
    }

    .empty-art {
      height: 100%;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      font-size: 9px;
      line-height: 1.45;
      letter-spacing: 0.05em;
    }

    .meta {
      min-width: 0;
    }

    .song {
      margin: 0 0 6px;
      font-size: 13px;
      line-height: 1.45;
      font-weight: 500;
      letter-spacing: -0.02em;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .artist {
      margin: 0;
      color: var(--muted);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .bar {
      height: 4px;
      margin: 9px 0 7px;
      border-radius: 999px;
      background: rgba(79,86,81,0.13);
      overflow: hidden;
    }

    .bar span {
      display: block;
      width: 42%;
      height: 100%;
      background: #d8b96a;
      border-radius: inherit;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 8px;
    }

    .track-list {
      display: grid;
      gap: 5px;
      max-height: 63px;
      overflow: hidden;
    }

    .track-item {
      display: grid;
      grid-template-columns: 13px 1fr;
      gap: 5px;
      align-items: center;
      min-height: 18px;
      padding: 3px 5px;
      border-radius: 6px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--line);
      font: inherit;
      font-size: 9px;
      text-align: left;
      cursor: pointer;
    }

    .track-item.active {
      background: var(--selected);
      border-color: rgba(216,185,106,0.48);
    }

    .track-item span:last-child {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .wheel-wrap {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      padding-top: 18px;
    }

    .wheel {
      position: relative;
      width: 158px;
      height: 158px;
      border-radius: 999px;
      border: 1.5px solid rgba(79, 86, 81, 0.24);
      background:
        radial-gradient(circle at center, var(--paper) 0 38px, transparent 39px),
        rgba(255,255,255,0.58);
      box-shadow:
        inset 0 2px 8px rgba(255,255,255,0.82),
        inset 0 -6px 16px rgba(79,86,81,0.05);
    }

    .wheel button {
      position: absolute;
      border: 0;
      background: transparent;
      color: var(--line);
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
    }

    .menu {
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px !important;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .prev {
      top: 50%;
      left: 19px;
      transform: translateY(-50%);
    }

    .next {
      top: 50%;
      right: 19px;
      transform: translateY(-50%);
    }

    .play {
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
    }

    .center {
      position: absolute;
      inset: 49px;
      border-radius: 999px;
      border: 1.3px solid rgba(79, 86, 81, 0.24);
      background: var(--paper);
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 12px;
      color: var(--line);
      box-shadow: 0 4px 10px rgba(79,86,81,0.04);
    }

    .iframe-wrap {
      display: none;
      position: relative;
      z-index: 1;
      margin-top: 12px;
      border-radius: 13px;
      overflow: hidden;
      border: 1px solid rgba(79,86,81,0.16);
      aspect-ratio: 16 / 9;
      background: #000;
    }

    .iframe-wrap.show { display: block; }

    .iframe-wrap iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .status {
      position: relative;
      z-index: 1;
      margin-top: 11px;
      min-height: 13px;
      text-align: center;
      font-size: 8px;
      letter-spacing: 0.04em;
      color: var(--muted);
    }

    @media (max-width: 340px) {
      .shell { padding: 8px; }
      .pod { padding: 16px; }
      .screen { min-height: 218px; }
      .wheel { width: 148px; height: 148px; }
      .center { inset: 46px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="pod" aria-label="SoftPod Music Widget">
      <div class="topbar">
        <span>softpod</span>
        <button class="add-toggle" id="toggleAdd" type="button" aria-label="Add track">＋</button>
      </div>

      <div class="add-panel" id="addPanel">
        <input id="urlInput" type="url" placeholder="paste link" />
        <button class="add-btn" id="addBtn" type="button">add</button>
      </div>

      <section class="screen">
        <div class="screen-head">
          <span>music</span>
          <div class="battery"><span></span></div>
        </div>

        <div class="art-row">
          <div class="album" id="album">
            <div class="empty-art">youtube<br />link</div>
          </div>
          <div class="meta">
            <p class="song" id="songTitle">Add a track</p>
            <p class="artist" id="artistText">playlist empty</p>
            <div class="bar"><span></span></div>
            <div class="time-row">
              <span>0:42</span>
              <span>3:24</span>
            </div>
          </div>
        </div>

        <div class="track-list" id="trackList"></div>
      </section>

      <div class="wheel-wrap">
        <div class="wheel" aria-label="click wheel controls">
          <button class="menu" id="openBtn" type="button">open</button>
          <button class="prev" id="prevBtn" type="button">‹‹</button>
          <button class="next" id="nextBtn" type="button">››</button>
          <button class="play" id="playBtn" type="button">▶</button>
          <button class="center" id="centerBtn" type="button">ok</button>
        </div>
      </div>

      <div class="iframe-wrap" id="iframeWrap"></div>
      <div class="status" id="status">press + to add youtube</div>
    </section>
  </main>

  <script>
    const KEY = "softpod-music-v1";
    let tracks = [];
    let current = -1;
    let playerOpen = false;

    const $ = (id) => document.getElementById(id);

    function extractYouTubeId(value) {
      const text = value.trim();
      if (/^[a-zA-Z0-9_-]{11}$/.test(text)) return text;

      const short = text.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
      if (short) return short[1];

      try {
        const url = new URL(text);
        if (url.hostname.includes("youtube.com")) {
          if (url.pathname === "/watch") return url.searchParams.get("v");
          const embed = url.pathname.match(/\/embed\/([a-zA-Z0-9_-]{11})/);
          if (embed) return embed[1];
          const shorts = url.pathname.match(/\/shorts\/([a-zA-Z0-9_-]{11})/);
          if (shorts) return shorts[1];
        }
      } catch (error) {}

      return null;
    }

    function thumb(id) {
      return `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
    }

    function watch(id) {
      return `https://www.youtube.com/watch?v=${id}`;
    }

    function save() {
      localStorage.setItem(KEY, JSON.stringify({ tracks, current }));
    }

    function load() {
      try {
        const data = JSON.parse(localStorage.getItem(KEY));
        if (Array.isArray(data?.tracks)) {
          tracks = data.tracks;
          current = typeof data.current === "number" ? data.current : (tracks.length ? 0 : -1);
        }
      } catch (error) {}
    }

    function render() {
      const track = tracks[current];
      const iframeWrap = $("iframeWrap");

      if (!track) {
        $("album").innerHTML = `<div class="empty-art">youtube<br />link</div>`;
        $("songTitle").textContent = "Add a track";
        $("artistText").textContent = "playlist empty";
        $("openBtn").disabled = true;
        iframeWrap.classList.remove("show");
        iframeWrap.innerHTML = "";
      } else {
        $("album").innerHTML = `<img src="${thumb(track.id)}" alt="">`;
        $("songTitle").textContent = track.title;
        $("artistText").textContent = "youtube";
        $("openBtn").disabled = false;

        if (playerOpen) {
          iframeWrap.classList.add("show");
          iframeWrap.innerHTML = `
            <iframe
              title="YouTube player"
              src="https://www.youtube.com/embed/${track.id}?autoplay=1&rel=0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen>
            </iframe>`;
        } else {
          iframeWrap.classList.remove("show");
          iframeWrap.innerHTML = "";
        }
      }

      $("playBtn").textContent = playerOpen ? "■" : "▶";

      const list = $("trackList");
      list.innerHTML = "";
      if (!tracks.length) {
        list.innerHTML = `
          <button class="track-item active" type="button">
            <span>01</span><span>empty slot</span>
          </button>
          <button class="track-item" type="button">
            <span>02</span><span>add from youtube</span>
          </button>`;
        return;
      }

      tracks.slice(0, 3).forEach((item, index) => {
        const realIndex = index;
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `track-item ${realIndex === current ? "active" : ""}`;
        btn.innerHTML = `<span>${String(realIndex + 1).padStart(2, "0")}</span><span>${item.title}</span>`;
        btn.addEventListener("click", () => {
          current = realIndex;
          playerOpen = false;
          save();
          render();
        });
        list.appendChild(btn);
      });
    }

    function addTrack() {
      const id = extractYouTubeId($("urlInput").value);
      if (!id) {
        $("status").textContent = "check youtube link";
        return;
      }

      if (tracks.some(t => t.id === id)) {
        $("status").textContent = "already added";
        return;
      }

      tracks.push({
        id,
        title: `Track ${tracks.length + 1}`
      });

      current = tracks.length - 1;
      playerOpen = false;
      $("urlInput").value = "";
      $("addPanel").classList.remove("open");
      $("status").textContent = "added";
      save();
      render();
    }

    function togglePlay() {
      if (current < 0) {
        $("status").textContent = "add a track first";
        return;
      }
      playerOpen = !playerOpen;
      render();
    }

    function goPrev() {
      if (!tracks.length) return;
      current = (current - 1 + tracks.length) % tracks.length;
      playerOpen = false;
      save();
      render();
    }

    function goNext() {
      if (!tracks.length) return;
      current = (current + 1) % tracks.length;
      playerOpen = false;
      save();
      render();
    }

    $("toggleAdd").addEventListener("click", () => {
      $("addPanel").classList.toggle("open");
      if ($("addPanel").classList.contains("open")) $("urlInput").focus();
    });

    $("addBtn").addEventListener("click", addTrack);
    $("urlInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter") addTrack();
    });

    $("playBtn").addEventListener("click", togglePlay);
    $("centerBtn").addEventListener("click", togglePlay);
    $("prevBtn").addEventListener("click", goPrev);
    $("nextBtn").addEventListener("click", goNext);

    $("openBtn").addEventListener("click", () => {
      const track = tracks[current];
      if (track) window.open(watch(track.id), "_blank", "noopener,noreferrer");
    });

    load();
    render();
  </script>
</body>
</html>
