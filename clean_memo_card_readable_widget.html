<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clean Memo Card Widget</title>
  <style>
    :root {
      --paper: #FFFDF7;
      --cream: #EEEFE8;
      --yellow: #FCEBBF;
      --pink: #E9ACBB;
      --blue: #C9D5E5;
      --ink: #25282C;
      --text: rgba(37,40,44,.86);
      --muted: rgba(37,40,44,.52);
      --light: rgba(37,40,44,.1);
      --line: rgba(37,40,44,.14);
      --shadow: rgba(37,40,44,.13);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: "Helvetica Neue", Arial, system-ui, sans-serif;
      color: var(--ink);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      overflow: hidden;
    }

    .widget {
      width: min(390px, 94vw);
      background: transparent;
    }

    .memo-card {
      position: relative;
      width: 100%;
      min-height: 300px;
      border-radius: 28px;
      overflow: hidden;
      background:
        radial-gradient(circle at 9px 9px, rgba(37,40,44,.055) 1px, transparent 1.4px),
        var(--paper);
      background-size: 14px 14px, 100% 100%;
      border: 1px solid var(--line);
      box-shadow:
        0 16px 28px var(--shadow),
        inset 0 1px 2px rgba(255,255,255,.9);
    }

    .top {
      height: 50px;
      background: var(--yellow);
      border-bottom: 1px solid rgba(37,40,44,.09);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      color: rgba(37,40,44,.62);
      font-size: 13px;
      letter-spacing: .01em;
    }

    .done {
      font-weight: 700;
      color: rgba(37,40,44,.64);
    }

    .content {
      padding: 24px 24px 56px;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 26px;
      line-height: 1.08;
      letter-spacing: -.045em;
      font-weight: 800;
      color: var(--ink);
    }

    .list {
      display: grid;
      gap: 13px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .item {
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 12px;
      align-items: start;
      color: var(--text);
      font-size: 16px;
      line-height: 1.28;
      letter-spacing: -.01em;
    }

    .box {
      width: 19px;
      height: 19px;
      margin-top: 1px;
      border-radius: 5px;
      border: 1.6px solid rgba(37,40,44,.23);
      background: rgba(255,255,255,.82);
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 800;
      color: var(--paper);
      flex: 0 0 auto;
    }

    .item.checked {
      color: rgba(37,40,44,.42);
      text-decoration: line-through;
      text-decoration-thickness: 1px;
      text-underline-offset: 2px;
    }

    .item.checked .box {
      background: var(--ink);
      border-color: var(--ink);
    }

    .footer {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 13px;
    }

    .tag strong {
      color: var(--pink);
      font-weight: 800;
    }

    .pink-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--pink);
      border: 1px solid rgba(37,40,44,.08);
    }

    @media (max-width: 420px) {
      body {
        padding: 14px;
      }

      .widget {
        width: min(360px, 94vw);
      }

      .memo-card {
        min-height: 286px;
        border-radius: 24px;
      }

      .top {
        height: 46px;
        padding: 0 19px;
        font-size: 12px;
      }

      .content {
        padding: 21px 20px 54px;
      }

      h1 {
        font-size: 24px;
        margin-bottom: 18px;
      }

      .item {
        font-size: 15px;
        gap: 11px;
      }

      .list {
        gap: 12px;
      }

      .footer {
        left: 20px;
        right: 20px;
        bottom: 17px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="widget">
    <article class="memo-card" aria-label="memo widget">
      <div class="top">
        <span id="dateText">Today</span>
        <span class="done">Done</span>
      </div>

      <div class="content">
        <h1>Things to do</h1>

        <ul class="list">
          <li class="item">
            <span class="box"></span>
            <span>Collect references</span>
          </li>
          <li class="item checked">
            <span class="box">✓</span>
            <span>Write memo</span>
          </li>
          <li class="item">
            <span class="box"></span>
            <span>Update archive</span>
          </li>
          <li class="item">
            <span class="box"></span>
            <span>Design one shot</span>
          </li>
        </ul>
      </div>

      <div class="footer">
        <span class="pink-dot" aria-hidden="true"></span>
        <span class="tag"><strong>#daily</strong> memo</span>
      </div>
    </article>
  </main>

  <script>
    const dateText = document.getElementById("dateText");

    function formatDate() {
      const now = new Date();
      const weekday = now.toLocaleDateString("en-US", { weekday: "short" });
      const month = now.toLocaleDateString("en-US", { month: "short" });
      const day = now.getDate();
      return `${weekday}, ${month} ${day}`;
    }

    dateText.textContent = formatDate();
  </script>
</body>
</html>
